<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Repair Academy</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --line:#303030;
    --gold:#f2c94c;
    --cyan:#38bdf8;
    --green:#27c46b;
    --muted:#9b9b9b;
    --soft:#dedede;
    --red:#b00020;
}

*{box-sizing:border-box;}

body{
    margin:0;
    min-height:100vh;
    color:#fff;
    font-family:"Manrope","IBM Plex Sans Arabic",Arial,sans-serif;
    background:
        radial-gradient(circle at top left,rgba(56,189,248,.16),transparent 30%),
        radial-gradient(circle at top right,rgba(242,201,76,.16),transparent 30%),
        radial-gradient(circle at bottom,rgba(176,0,32,.12),transparent 35%),
        linear-gradient(180deg,#0d0d0d,#050505);
}

body[dir="rtl"]{direction:rtl;}

.app{
    max-width:560px;
    margin:auto;
    padding:14px;
}

.topbar{
    display:grid;
    grid-template-columns:42px 1fr 42px;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
}

.logo{text-align:center;}

.logo-mark{
    width:34px;
    height:34px;
    margin:0 auto 5px;
    border-radius:12px;
    border:1px solid rgba(56,189,248,.55);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--cyan);
    font-weight:900;
    box-shadow:0 0 18px rgba(56,189,248,.26);
}

.logo h1{
    margin:0;
    font-size:18px;
    font-weight:900;
    letter-spacing:.6px;
    color:#eafaff;
    text-shadow:0 0 8px rgba(56,189,248,.48);
}

.logo h1 span{color:var(--gold);}

.status{
    font-size:11px;
    color:var(--muted);
    font-weight:700;
}

.icon-btn,.lang-btn{
    width:42px;
    height:42px;
    border:1px solid var(--line);
    border-radius:13px;
    background:#121212;
    color:#fff;
    font-weight:900;
}

.lang-btn{color:var(--gold);}

.page{
    display:none;
    animation:fade .18s;
}

.page.active{display:block;}

@keyframes fade{
    from{opacity:.45;transform:translateY(6px);}
    to{opacity:1;}
}

.hero,.panel{
    border:1px solid var(--line);
    border-radius:16px;
    background:rgba(20,20,20,.94);
    padding:17px;
    margin-bottom:12px;
    text-align:center;
    box-shadow:0 14px 35px rgba(0,0,0,.24);
}

.hero{
    background:
        linear-gradient(145deg,rgba(56,189,248,.14),rgba(242,201,76,.13)),
        rgba(20,20,20,.96);
}

.title{
    margin:0;
    font-size:22px;
    font-weight:900;
    line-height:1.25;
}

.text{
    margin:9px 0 0;
    color:var(--soft);
    font-size:14px;
    line-height:1.65;
    font-weight:600;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin:11px 0;
}

.stat{
    border:1px solid var(--line);
    border-radius:13px;
    padding:11px 6px;
    background:#141414;
    text-align:center;
}

.stat strong{
    display:block;
    color:var(--gold);
    font-size:18px;
}

.stat small{
    display:block;
    color:var(--muted);
    font-size:12px;
}

.progress-wrap{
    height:10px;
    border-radius:999px;
    background:#080808;
    border:1px solid var(--line);
    overflow:hidden;
    margin-top:14px;
}

.progress{
    height:100%;
    width:0;
    background:linear-gradient(90deg,var(--cyan),var(--gold),var(--green));
}

button{
    min-height:44px;
    padding:11px;
    border-radius:13px;
    border:1px solid var(--line);
    background:#111;
    color:#fff;
    font-family:inherit;
    font-size:14px;
    font-weight:900;
    cursor:pointer;
}

button:disabled{
    opacity:.4;
    cursor:not-allowed;
}

.primary{
    background:linear-gradient(135deg,var(--gold),#ffe08a);
    color:#111;
}

.danger{
    background:linear-gradient(180deg,#b00020,#780015);
}

.main-action{width:100%;}

.section-title{
    text-align:center;
    margin:18px 2px 10px;
}

.section-title h3{
    margin:0;
    font-size:17px;
    font-weight:900;
}

.section-title p{
    margin:3px 0 0;
    color:var(--muted);
    font-size:13px;
}

.branch-title{
    margin:16px auto 10px;
    width:fit-content;
    padding:8px 12px;
    border-radius:999px;
    border:1px solid rgba(56,189,248,.28);
    background:rgba(56,189,248,.08);
    color:#a9e8ff;
    font-size:12px;
    font-weight:900;
}

.tree{
    display:grid;
    gap:13px;
}

.tree-node{
    position:relative;
    display:grid;
    grid-template-columns:45px 1fr;
    gap:10px;
    align-items:center;
}

body[dir="rtl"] .tree-node{
    grid-template-columns:1fr 45px;
}

.tree-node:not(:last-child)::after{
    content:"";
    position:absolute;
    left:22px;
    top:49px;
    width:2px;
    height:28px;
    background:linear-gradient(180deg,rgba(56,189,248,.7),rgba(242,201,76,.25));
}

body[dir="rtl"] .tree-node:not(:last-child)::after{
    left:auto;
    right:22px;
}

.node-icon{
    width:45px;
    height:45px;
    border-radius:15px;
    border:1px solid rgba(56,189,248,.45);
    background:rgba(56,189,248,.1);
    color:var(--cyan);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:900;
}

.node-card{
    min-height:96px;
    border:1px solid var(--line);
    border-radius:15px;
    background:linear-gradient(180deg,#1c1c1c,#101010);
    text-align:center;
    padding:13px 12px;
}

.node-card.done{
    border-color:rgba(39,196,107,.8);
}

.node-card.locked{
    opacity:.48;
}

.node-card strong{
    display:block;
    font-size:15.5px;
}

.node-card small{
    display:block;
    color:var(--muted);
    font-size:12.5px;
    margin-top:7px;
    line-height:1.5;
}

.badge{
    display:inline-block;
    margin-top:9px;
    padding:5px 9px;
    border-radius:999px;
    background:rgba(242,201,76,.12);
    color:var(--gold);
    font-size:11px;
    font-weight:900;
}

.list{
    display:grid;
    gap:8px;
}

.lesson{
    border:1px solid var(--line);
    border-radius:14px;
    background:#1b1b1b;
    padding:13px;
    text-align:center;
}

.lesson strong{font-size:15.5px;}

.lesson p{
    color:var(--muted);
    font-size:13.5px;
    line-height:1.65;
}

.book-controls,.action-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:9px;
    margin-top:11px;
}

.book-counter{
    color:var(--gold);
    font-size:12px;
    font-weight:900;
    margin-top:10px;
}

.visual{
    max-width:300px;
    margin:14px auto 4px;
    padding:14px;
    border-radius:22px;
    border:1px solid rgba(56,189,248,.32);
    background:linear-gradient(180deg,#232323,#111);
}

.chip{
    width:100px;
    height:72px;
    margin:8px auto;
    border-radius:12px;
    border:2px solid rgba(242,201,76,.7);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--gold);
    font-weight:900;
    text-align:center;
}

.screen{
    height:54px;
    border-radius:12px;
    background:#9fd7b2;
    color:#071107;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
}

.symbol{
    margin:12px auto;
    padding:13px;
    border-radius:14px;
    border:1px solid rgba(242,201,76,.28);
    color:var(--gold);
    font-size:20px;
    font-weight:900;
}

.flow{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    gap:8px;
}

.pad{
    border:1px solid #333;
    border-radius:12px;
    min-height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#ccc;
}

.meter{
    width:78px;
    height:54px;
    border:1px solid #444;
    border-radius:12px;
    padding:7px;
}

.meter div{
    height:100%;
    border-radius:8px;
    background:#9fd7b2;
    color:#071107;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
}

.sos-box{
    border-color:rgba(176,0,32,.55);
    background:rgba(176,0,32,.12);
}

.footer{
    color:#777;
    font-size:11px;
    text-align:center;
    padding:15px 0 5px;
    font-weight:700;
}

@media(max-width:390px){
    .app{padding:12px;}
    .logo h1{font-size:16px;}
    .tree-node{grid-template-columns:42px 1fr;}
    body[dir="rtl"] .tree-node{grid-template-columns:1fr 42px;}
    .node-icon{width:42px;height:42px;}
    .tree-node:not(:last-child)::after{left:20px;}
    body[dir="rtl"] .tree-node:not(:last-child)::after{right:20px;}
}

@media(max-width:330px){
    .stats,.book-controls,.action-row{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="app">
    <div class="topbar">
        <button class="icon-btn" onclick="goHome()">⌂</button>
        <div class="logo">
            <div class="logo-mark">⌁</div>
            <h1><span>MASTER</span> REPAIR ACADEMY</h1>
            <div class="status" id="telegramStatus"></div>
        </div>
        <button class="lang-btn" id="langButton" onclick="toggleLanguage()">AR</button>
    </div>

    <div id="home" class="page active">
        <div class="hero">
            <h2 class="title" id="heroTitle"></h2>
            <p class="text" id="heroText"></p>
            <div class="progress-wrap"><div class="progress" id="progressBar"></div></div>
            <p class="text" id="progressText"></p>
        </div>

        <div class="stats">
            <div class="stat"><strong id="doneCount">0</strong><small id="completedLabel"></small></div>
            <div class="stat"><strong id="totalCount">0</strong><small id="stepsLabel"></small></div>
            <div class="stat"><strong>SOS</strong><small id="supportLabel"></small></div>
        </div>

        <button class="primary main-action" onclick="continueLearning()" id="continueButton"></button>

        <div class="section-title">
            <h3 id="treeTitle"></h3>
            <p id="treeSubtitle"></p>
        </div>

        <div id="treeContainer"></div>

        <div class="section-title">
            <h3 id="supportTitle"></h3>
            <p id="supportSubtitle"></p>
        </div>

        <div class="panel sos-box">
            <h2 class="title" id="sosTitle"></h2>
            <p class="text" id="sosText"></p>
            <br>
            <button class="danger" onclick="openSOS()" id="sosButton"></button>
        </div>
    </div>

    <div id="bookPage" class="page">
        <div class="panel">
            <h2 class="title" id="bookTitle"></h2>
            <p class="text" id="bookDesc"></p>
            <div class="book-counter" id="bookCounter"></div>
        </div>

        <div id="bookVisual"></div>

        <div class="panel">
            <h2 class="title" id="bookPageTitle"></h2>
            <p class="text" id="bookPageText"></p>
        </div>

        <div class="list" id="bookPoints"></div>

        <div class="book-controls">
            <button onclick="previousBookPage()" id="prevButton"></button>
            <button onclick="nextBookPage()" id="nextButton"></button>
        </div>

        <div class="action-row">
            <button onclick="goHome()" id="bookBackButton"></button>
            <button class="primary" onclick="markDone()" id="bookDoneButton"></button>
        </div>
    </div>

    <div class="footer" id="footerText"></div>
</div>

<script>
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if(tg){
    tg.ready();
    tg.expand();
}

let currentLang = localStorage.getItem("master_repair_lang") || "en";
let currentNode = null;
let currentBookPage = 0;

const ui = {
    en:{
        dir:"ltr",
        langButton:"AR",
        connected:"Connected to Telegram",
        browser:"Browser Test Mode",
        heroTitle:"Motherboard Repair Learning Path",
        heroText:"Tools, components, safety, circuits and boot logic in one clean roadmap.",
        completed:"Completed",
        steps:"Steps",
        support:"Support",
        continue:"Continue Learning",
        treeTitle:"Learning Tree",
        treeSubtitle:"From basics to board systems",
        supportTitle:"Support",
        supportSubtitle:"Need help?",
        sosTitle:"SOS Repair",
        sosText:"Open the Telegram group to ask for help.",
        sosButton:"Open SOS",
        back:"Back",
        done:"Done",
        prev:"Previous",
        next:"Next",
        footer:"Master Repair Academy • Learning Tree",
        completedProgress:"completed",
        open:"Open",
        locked:"Locked",
        doneState:"Done",
        lockedMessage:"Complete the previous step first.",
        completedMessage:"Step completed!"
    },
    ar:{
        dir:"rtl",
        langButton:"EN",
        connected:"متصل بتيليجرام",
        browser:"وضع الاختبار",
        heroTitle:"مسار تعلم إصلاح اللوحات",
        heroText:"الأدوات، المكونات، السلامة، الدوائر ومنطق الإقلاع في خريطة واحدة.",
        completed:"مكتمل",
        steps:"خطوات",
        support:"الدعم",
        continue:"متابعة التعلم",
        treeTitle:"شجرة التعلم",
        treeSubtitle:"من الأساسيات إلى أنظمة اللوحة",
        supportTitle:"الدعم",
        supportSubtitle:"تحتاج مساعدة؟",
        sosTitle:"دعم الإصلاح",
        sosText:"افتح مجموعة تيليجرام لطلب المساعدة.",
        sosButton:"فتح الدعم",
        back:"رجوع",
        done:"تم",
        prev:"السابق",
        next:"التالي",
        footer:"Master Repair Academy • شجرة التعلم",
        completedProgress:"مكتمل",
        open:"فتح",
        locked:"مغلق",
        doneState:"تم",
        lockedMessage:"أكمل الخطوة السابقة أولا.",
        completedMessage:"تم إنهاء الخطوة!"
    }
};

function tr(key){return ui[currentLang][key];}
function pair(en, ar){return {en, ar};}
function txt(obj){return obj[currentLang];}

function makePage(mode, display, symbol, titleEn, titleAr, textEn, textAr, points){
    return {
        mode,
        display,
        symbol,
        title:pair(titleEn,titleAr),
        text:pair(textEn,textAr),
        points:points.map(item => ({
            title:pair(item[0],item[1]),
            text:pair(item[2],item[3])
        }))
    };
}

function makeBook(titleEn, titleAr, descEn, descAr, symbol, roleEn, roleAr, testEn, testAr, symptomEn, symptomAr){
    return [
        makePage(
            "role",
            titleEn,
            symbol,
            titleEn,
            titleAr,
            roleEn,
            roleAr,
            [
                ["Role","الدور",roleEn,roleAr],
                ["Before repair","قبل الإصلاح","Understand the function before replacing anything.","افهم الوظيفة قبل تغيير أي شيء."]
            ]
        ),
        makePage(
            "schema",
            "SCHEMA",
            symbol,
            "Schematic Symbol",
            "رمز المخطط",
            "This is the simplified symbol or block used in electronic logic.",
            "هذا هو الرمز أو البلوك المبسط المستخدم في منطق الدوائر.",
            [
                ["Why it matters","لماذا مهم؟","Schematics help you follow the line and understand the circuit.","المخططات تساعدك على تتبع الخط وفهم الدائرة."],
                ["Boardview","البوردفيو","Use boardview to find the real location on the board.","استخدم البوردفيو لمعرفة مكان القطعة الحقيقي على اللوحة."]
            ]
        ),
        makePage(
            "test",
            "TEST",
            symbol,
            "How To Test",
            "طريقة الفحص",
            testEn,
            testAr,
            [
                ["Correct mode","الوضع الصحيح","Use the correct multimeter mode before measuring.","استخدم وضع الملتيميتر الصحيح قبل القياس."],
                ["Confirm","التأكيد","Compare with a known good board when possible.","قارن مع لوحة سليمة إذا أمكن."]
            ]
        ),
        makePage(
            "fault",
            "FAULT",
            symbol,
            "Common Symptoms",
            "الأعراض الشائعة",
            symptomEn,
            symptomAr,
            [
                ["Rule","القاعدة","Never replace without proof.","لا تغير بدون دليل."],
                ["Method","الطريقة","Observe, measure, confirm, then repair.","لاحظ، قس، أكد، ثم أصلح."]
            ]
        )
    ];
}

function node(id, icon, titleEn, titleAr, descEn, descAr, book){
    return {
        id,
        icon,
        title:pair(titleEn,titleAr),
        desc:pair(descEn,descAr),
        book
    };
}

const multimeterBook = [
    makePage("meter","0.00 V","V","What Is a Multimeter?","ما هو الملتيميتر؟","A measuring tool that helps you stop guessing and start proving faults.","أداة قياس تساعدك على التوقف عن التخمين وإثبات الأعطال.",[
        ["It measures","يقيس","Voltage, resistance, continuity and diode values.","الفولت، المقاومة، الاستمرارية وقيم الدايود."]
    ]),
    makePage("meter","4.20 V","V","Voltage Mode","وضع الفولت","Checks if power is present on a line.","يفحص هل الطاقة موجودة على الخط.",[
        ["Use","الاستخدام","Black probe on ground, red probe on the point.","الأسود على الأرضي، الأحمر على نقطة القياس."]
    ]),
    makePage("meter","220 Ω","Ω","Resistance Mode","وضع المقاومة","Measures resistance with power disconnected.","يقيس المقاومة مع فصل الطاقة.",[
        ["Warning","تحذير","Do not measure resistance on a powered board.","لا تقس المقاومة على لوحة موصولة بالطاقة."]
    ]),
    makePage("meter","BEEP",")))","Continuity Mode","وضع الاستمرارية","Checks if two points are connected.","يفحص هل توجد وصلة بين نقطتين.",[
        ["Use","الاستخدام","Fuses, broken lines, connectors and ground.","الفيوزات، الخطوط المقطوعة، الكونكتورات والأرضي."]
    ]),
    makePage("meter","0.528","▷|","Diode Mode","وضع الدايود","Very useful to compare board lines.","مفيد جدا لمقارنة خطوط اللوحة.",[
        ["Best method","أفضل طريقة","Compare with a known good board.","قارن مع لوحة سليمة."]
    ])
];

const books = {
    resistor: makeBook(
        "Resistor","المقاومة",
        "Role, schematic symbol and test method.","الدور، رمز المخطط وطريقة الفحص.",
        "─/\\/\\/─",
        "A resistor limits or controls current in a circuit.","المقاومة تحد أو تتحكم في مرور التيار داخل الدائرة.",
        "Test with resistance mode Ω. Power must be off.","افحصها بوضع المقاومة Ω مع فصل الطاقة.",
        "Wrong value or bad soldering can create abnormal behavior.","قيمة خاطئة أو لحام سيئ قد يسبب سلوكا غير طبيعي."
    ),
    capacitor: makeBook(
        "Capacitor","المكثف",
        "Role, schematic symbol and test method.","الدور، رمز المخطط وطريقة الفحص.",
        "─| |─",
        "A capacitor stores energy and filters electrical noise on power lines.","المكثف يخزن الطاقة وينقي التشويش الكهربائي في خطوط الطاقة.",
        "Use continuity or diode mode to check for short to ground.","استخدم الاستمرارية أو الدايود لفحص الشورت مع الأرضي.",
        "A shorted capacitor can stop a power line completely.","المكثف الشورت قد يوقف خط طاقة بالكامل."
    ),
    diode: makeBook(
        "Diode","الدايود",
        "Role, schematic symbol and test method.","الدور، رمز المخطط وطريقة الفحص.",
        "─|>|─",
        "A diode allows current to pass mainly in one direction.","الدايود يسمح بمرور التيار غالبا في اتجاه واحد.",
        "Test with diode mode. One direction gives a value, the opposite side usually blocks.","افحصه بوضع الدايود. اتجاه يعطي قيمة والاتجاه الآخر غالبا يمنع المرور.",
        "Wrong orientation or shorted diode can stop the circuit.","التركيب العكسي أو الدايود الشورت قد يوقف الدائرة."
    ),
    coil: makeBook(
        "Coil","الملف",
        "Role, schematic symbol and test method.","الدور، رمز المخطط وطريقة الفحص.",
        "─oooo─",
        "A coil is used in power circuits and voltage regulation.","الملف يستخدم في دوائر الطاقة وتنظيم الفولت.",
        "Use continuity mode. Most coils beep because resistance is low.","استخدم الاستمرارية. أغلب الملفات تعطي صفارة لأن مقاومتها منخفضة.",
        "A broken coil can cut a power line.","الملف المقطوع قد يقطع خط طاقة."
    ),
    fuse: makeBook(
        "Fuse","الفيوز",
        "Role, schematic symbol and test method.","الدور، رمز المخطط وطريقة الفحص.",
        "─[F]─",

function allNodes(){return tree.flatMap(group => group.nodes);}
function doneIds(){return JSON.parse(localStorage.getItem("master_repair_done") || "[]");}

function saveDone(id){
    const ids = doneIds();
    if(!ids.includes(id)) ids.push(id);
    localStorage.setItem("master_repair_done", JSON.stringify(ids));
    localStorage.setItem("master_repair_last", id);
}

function isUnlocked(node){
    const nodes = allNodes();
    const index = nodes.findIndex(item => item.id === node.id);
    if(index === 0) return true;
    return doneIds().includes(nodes[index - 1].id);
}

function applyLanguage(){
    document.documentElement.lang = currentLang;
    document.documentElement.dir = tr("dir");
    document.body.dir = tr("dir");

    document.getElementById("langButton").textContent = tr("langButton");
    document.getElementById("telegramStatus").textContent = tg ? tr("connected") : tr("browser");
    document.getElementById("heroTitle").textContent = tr("heroTitle");
    document.getElementById("heroText").textContent = tr("heroText");
    document.getElementById("completedLabel").textContent = tr("completed");
    document.getElementById("stepsLabel").textContent = tr("steps");
    document.getElementById("supportLabel").textContent = tr("support");
    document.getElementById("continueButton").textContent = tr("continue");
    document.getElementById("treeTitle").textContent = tr("treeTitle");
    document.getElementById("treeSubtitle").textContent = tr("treeSubtitle");
    document.getElementById("supportTitle").textContent = tr("supportTitle");
    document.getElementById("supportSubtitle").textContent = tr("supportSubtitle");
    document.getElementById("sosTitle").textContent = tr("sosTitle");
    document.getElementById("sosText").textContent = tr("sosText");
    document.getElementById("sosButton").textContent = tr("sosButton");
    document.getElementById("prevButton").textContent = tr("prev");
    document.getElementById("nextButton").textContent = tr("next");
    document.getElementById("bookBackButton").textContent = tr("back");
    document.getElementById("bookDoneButton").textContent = tr("done");
    document.getElementById("footerText").textContent = tr("footer");

    renderTree();

    if(currentNode && document.getElementById("bookPage").classList.contains("active")){
        renderBookPage();
    }
}

function toggleLanguage(){
    currentLang = currentLang === "en" ? "ar" : "en";
    localStorage.setItem("master_repair_lang", currentLang);
    applyLanguage();
}

function renderProgress(){
    const total = allNodes().length;
    const done = doneIds().length;
    const pct = total ? Math.round((done / total) * 100) : 0;

    document.getElementById("doneCount").textContent = done;
    document.getElementById("totalCount").textContent = total;
    document.getElementById("progressText").textContent = pct + "% " + tr("completedProgress");
    document.getElementById("progressBar").style.width = pct + "%";
}

function renderTree(){
    renderProgress();

    const container = document.getElementById("treeContainer");
    container.innerHTML = "";

    tree.forEach(group => {
        const title = document.createElement("div");
        title.className = "branch-title";
        title.textContent = txt(group.group);
        container.appendChild(title);

        const wrap = document.createElement("div");
        wrap.className = "tree";

        group.nodes.forEach(item => {
            const done = doneIds().includes(item.id);
            const unlocked = isUnlocked(item);

            const row = document.createElement("div");
            row.className = "tree-node";

            const icon = document.createElement("div");
            icon.className = "node-icon";
            icon.textContent = done ? "✓" : item.icon;

            const button = document.createElement("button");
            button.className = "node-card" + (done ? " done" : "") + (!unlocked ? " locked" : "");
            button.onclick = () => unlocked ? openNode(item) : showLockedMessage();
            button.innerHTML = `
                <strong>${txt(item.title)}</strong>
                <small>${txt(item.desc)}</small>
                <span class="badge">${done ? tr("doneState") : unlocked ? tr("open") : tr("locked")}</span>
            `;

            if(currentLang === "ar"){
                row.appendChild(button);
                row.appendChild(icon);
            }else{
                row.appendChild(icon);
                row.appendChild(button);
            }

            wrap.appendChild(row);
        });

        container.appendChild(wrap);
    });
}

function openNode(item){
    currentNode = item;
    currentBookPage = 0;
    localStorage.setItem("master_repair_last", item.id);
    renderBookPage();
    showPage("bookPage");
}

function renderBookPage(){
    const page = currentNode.book[currentBookPage];

    document.getElementById("bookTitle").textContent = txt(currentNode.title);
    document.getElementById("bookDesc").textContent = txt(currentNode.desc);
    document.getElementById("bookCounter").textContent = (currentBookPage + 1) + " / " + currentNode.book.length;
    document.getElementById("bookPageTitle").textContent = txt(page.title);
    document.getElementById("bookPageText").textContent = txt(page.text);

    document.getElementById("bookVisual").innerHTML = `
        <div class="visual">
            <div class="chip">${page.mode.toUpperCase()}</div>
            <div class="screen">${page.display}</div>
            <div class="symbol">${page.symbol}</div>
            <div class="flow">
                <div class="pad">IN</div>
                <div class="meter"><div>${page.display}</div></div>
                <div class="pad">OUT</div>
            </div>
        </div>
    `;

    const list = document.getElementById("bookPoints");
    list.innerHTML = "";

    page.points.forEach(point => {
        const box = document.createElement("div");
        box.className = "lesson";
        box.innerHTML = `
            <strong>${txt(point.title)}</strong>
            <p>${txt(point.text)}</p>
        `;
        list.appendChild(box);
    });

    document.getElementById("prevButton").disabled = currentBookPage === 0;
    document.getElementById("nextButton").disabled = currentBookPage === currentNode.book.length - 1;
}

function previousBookPage(){
    if(currentBookPage > 0){
        currentBookPage--;
        renderBookPage();
        window.scrollTo(0,0);
    }
}

function nextBookPage(){
    if(currentBookPage < currentNode.book.length - 1){
        currentBookPage++;
        renderBookPage();
        window.scrollTo(0,0);
    }
}

function continueLearning(){
    const nodes = allNodes();
    const done = doneIds();

    let next = nodes.find(item => !done.includes(item.id) && isUnlocked(item));

    if(!next){
        const last = localStorage.getItem("master_repair_last");
        next = nodes.find(item => item.id === last) || nodes[0];
    }

    openNode(next);
}

function markDone(){
    if(currentNode){
        saveDone(currentNode.id);
        renderProgress();
    }

    if(tg && tg.HapticFeedback){
        tg.HapticFeedback.notificationOccurred("success");
    }

    if(tg && tg.showAlert){
        tg.showAlert(tr("completedMessage"));
    }else{
        alert(tr("completedMessage"));
    }
}

function showLockedMessage(){
    if(tg && tg.showAlert){
        tg.showAlert(tr("lockedMessage"));
    }else{
        alert(tr("lockedMessage"));
    }
}

function showPage(id){
    document.querySelectorAll(".page").forEach(page => page.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    window.scrollTo(0,0);
}

function goHome(){
    currentNode = null;
    renderTree();
    showPage("home");
}

    if(tg && tg.openTelegramLink){
        tg.openTelegramLink(link);
    }else{
