<style>
:root{--line:#303030;--gold:#f2c94c;--cyan:#38bdf8;--green:#27c46b;--muted:#9b9b9b;--soft:#dedede;--red:#b00020}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;color:#fff;font-family:Manrope,"IBM Plex Sans Arabic",Arial;background:radial-gradient(circle at top left,rgba(56,189,248,.16),transparent 30%),radial-gradient(circle at top right,rgba(242,201,76,.16),transparent 30%),linear-gradient(180deg,#0d0d0d,#050505)}
body[dir=rtl]{direction:rtl}
.app{max-width:560px;margin:auto;padding:14px}
.topbar{display:grid;grid-template-columns:42px 1fr 42px;align-items:center;gap:10px;margin-bottom:14px}
.logo{text-align:center}.logo-mark{width:34px;height:34px;margin:0 auto 5px;border-radius:12px;border:1px solid rgba(56,189,248,.55);display:flex;align-items:center;justify-content:center;color:var(--cyan);font-weight:900;box-shadow:0 0 18px rgba(56,189,248,.26)}
.logo h1{margin:0;font-size:18px;font-weight:900;letter-spacing:.6px;color:#eafaff;text-shadow:0 0 8px rgba(56,189,248,.48)}.logo h1 span{color:var(--gold)}
.status{font-size:11px;color:var(--muted);font-weight:700}
.icon-btn,.lang-btn{width:42px;height:42px;border:1px solid var(--line);border-radius:13px;background:#121212;color:#fff;font-weight:900}.lang-btn{color:var(--gold)}
.page{display:none;animation:fade .18s}.active{display:block}@keyframes fade{from{opacity:.45;transform:translateY(6px)}to{opacity:1}}
.hero,.panel{border:1px solid var(--line);border-radius:16px;background:rgba(20,20,20,.94);padding:17px;margin-bottom:12px;text-align:center;box-shadow:0 14px 35px rgba(0,0,0,.24)}
.hero{background:linear-gradient(145deg,rgba(56,189,248,.14),rgba(242,201,76,.13)),rgba(20,20,20,.96)}
.title{margin:0;font-size:22px;font-weight:900}.text{margin:9px 0 0;color:var(--soft);font-size:14px;line-height:1.65;font-weight:600}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:11px 0}.stat{border:1px solid var(--line);border-radius:13px;padding:11px 6px;background:#141414;text-align:center}.stat strong{color:var(--gold);font-size:18px}.stat small{display:block;color:var(--muted);font-size:12px}
.progress-wrap{height:10px;border-radius:999px;background:#080808;border:1px solid var(--line);overflow:hidden;margin-top:14px}.progress{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--gold),var(--green))}
button{min-height:44px;padding:11px;border-radius:13px;border:1px solid var(--line);background:#111;color:#fff;font-family:inherit;font-size:14px;font-weight:900}button:disabled{opacity:.4}.primary{background:linear-gradient(135deg,var(--gold),#ffe08a);color:#111}.danger{background:linear-gradient(180deg,#b00020,#780015)}
.main-action{width:100%}.section-title{text-align:center;margin:18px 2px 10px}.section-title h3{margin:0;font-size:17px;font-weight:900}.section-title p{margin:3px 0 0;color:var(--muted);font-size:13px}
.branch-title{margin:16px auto 10px;width:fit-content;padding:8px 12px;border-radius:999px;border:1px solid rgba(56,189,248,.28);background:rgba(56,189,248,.08);color:#a9e8ff;font-size:12px;font-weight:900}
.tree{display:grid;gap:13px}.tree-node{position:relative;display:grid;grid-template-columns:45px 1fr;gap:10px;align-items:center}body[dir=rtl] .tree-node{grid-template-columns:1fr 45px}.tree-node:not(:last-child)::after{content:"";position:absolute;left:22px;top:49px;width:2px;height:28px;background:linear-gradient(180deg,rgba(56,189,248,.7),rgba(242,201,76,.25))}body[dir=rtl] .tree-node:not(:last-child)::after{left:auto;right:22px}
.node-icon{width:45px;height:45px;border-radius:15px;border:1px solid rgba(56,189,248,.45);background:rgba(56,189,248,.1);color:var(--cyan);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900}
.node-card{min-height:96px;border:1px solid var(--line);border-radius:15px;background:linear-gradient(180deg,#1c1c1c,#101010);text-align:center;padding:13px 12px}.node-card.done{border-color:rgba(39,196,107,.8)}.node-card.locked{opacity:.48}.node-card strong{display:block;font-size:15.5px}.node-card small{display:block;color:var(--muted);font-size:12.5px;margin-top:7px}
.badge{display:inline-block;margin-top:9px;padding:5px 9px;border-radius:999px;background:rgba(242,201,76,.12);color:var(--gold);font-size:11px;font-weight:900}
.list{display:grid;gap:8px}.lesson{border:1px solid var(--line);border-radius:14px;background:#1b1b1b;padding:13px;text-align:center}.lesson strong{font-size:15.5px}.lesson p{color:var(--muted);font-size:13.5px;line-height:1.65}
.book-controls,.action-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:11px}.book-counter{color:var(--gold);font-size:12px;font-weight:900;margin-top:10px}
.visual{max-width:300px;margin:14px auto 4px;padding:14px;border-radius:22px;border:1px solid rgba(56,189,248,.32);background:linear-gradient(180deg,#232323,#111)}
.chip{width:100px;height:72px;margin:8px auto;border-radius:12px;border:2px solid rgba(242,201,76,.7);display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:900}.screen{height:54px;border-radius:12px;background:#9fd7b2;color:#071107;display:flex;align-items:center;justify-content:center;font-weight:900}.symbol{margin:12px auto;padding:13px;border-radius:14px;border:1px solid rgba(242,201,76,.28);color:var(--gold);font-size:20px;font-weight:900}.flow{display:grid;grid-template-columns:1fr auto 1fr;gap:8px}.pad{border:1px solid #333;border-radius:12px;min-height:38px;display:flex;align-items:center;justify-content:center;color:#ccc}.meter{width:78px;height:54px;border:1px solid #444;border-radius:12px;padding:7px}.meter div{height:100%;border-radius:8px;background:#9fd7b2;color:#071107;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
.footer{color:#777;font-size:11px;text-align:center;padding:15px 0 5px;font-weight:700}
@media(max-width:390px){.app{padding:12px}.logo h1{font-size:16px}.tree-node{grid-template-columns:42px 1fr}body[dir=rtl] .tree-node{grid-template-columns:1fr 42px}.node-icon{width:42px;height:42px}.tree-node:not(:last-child)::after{left:20px}body[dir=rtl] .tree-node:not(:last-child)::after{right:20px}}
@media(max-width:330px){.stats,.book-controls,.action-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<div class="topbar"><button class="icon-btn" onclick="goHome()">⌂</button><div class="logo"><div class="logo-mark">⌁</div><h1><span>MASTER</span> REPAIR ACADEMY</h1><div class="status" id="telegramStatus"></div></div><button class="lang-btn" id="langButton" onclick="toggleLanguage()">AR</button></div>

</div>

<div id="bookPage" class="page"><div class="panel"><h2 class="title" id="bookTitle"></h2><p class="text" id="bookDesc"></p><div class="book-counter" id="bookCounter"></div></div><div id="bookVisual"></div><div class="panel"><h2 class="title" id="bookPageTitle"></h2><p class="text" id="bookPageText"></p></div><div class="list" id="bookPoints"></div><div class="book-controls"><button onclick="previousBookPage()" id="prevButton"></button><button onclick="nextBookPage()" id="nextButton"></button></div><div class="action-row"><button onclick="goHome()" id="bookBackButton"></button><button class="primary" onclick="markDone()" id="bookDoneButton"></button></div></div>

</div>

<script>
const tg=window.Telegram&&window.Telegram.WebApp?window.Telegram.WebApp:null;if(tg){tg.ready();tg.expand()}
let currentLang=localStorage.getItem("master_repair_lang")||"en",currentNode=null,currentBookPage=0;
const ui={
en:{dir:"ltr",langButton:"AR",connected:"Connected to Telegram",browser:"Browser Test Mode",heroTitle:"Motherboard Boot Logic Path",heroText:"Learn the phone motherboard in the same order it wakes up.",completed:"Completed",steps:"Steps",support:"Support",continue:"Continue Learning",treeTitle:"Boot Learning Tree",treeSubtitle:"From battery to full system startup",supportTitle:"Support",supportSubtitle:"Need help?",sosTitle:"SOS Repair",sosText:"Open the Telegram group to ask for help.",sosButton:"Open SOS",back:"Back",done:"Done",prev:"Previous",next:"Next",footer:"Master Repair Academy • Boot Logic",completedProgress:"completed",open:"Open",locked:"Locked",doneState:"Done",lockedMessage:"Complete the previous step first.",completedMessage:"Step completed!"},
ar:{dir:"rtl",langButton:"EN",connected:"متصل بتيليجرام",browser:"وضع الاختبار",heroTitle:"مسار منطق إقلاع اللوحة",heroText:"تعلم لوحة الهاتف بنفس ترتيب استيقاظها وتشغيلها.",completed:"مكتمل",steps:"خطوات",support:"الدعم",continue:"متابعة التعلم",treeTitle:"شجرة تعلم الإقلاع",treeSubtitle:"من البطارية إلى تشغيل النظام بالكامل",supportTitle:"الدعم",supportSubtitle:"تحتاج مساعدة؟",sosTitle:"دعم الإصلاح",sosText:"افتح مجموعة تيليجرام لطلب المساعدة.",sosButton:"فتح الدعم",back:"رجوع",done:"تم",prev:"السابق",next:"التالي",footer:"Master Repair Academy • منطق الإقلاع",completedProgress:"مكتمل",open:"فتح",locked:"مغلق",doneState:"تم",lockedMessage:"أكمل الخطوة السابقة أولا.",completedMessage:"تم إنهاء الخطوة!"}
};
function p(en,ar){return{en,ar}}
function pg(mode,display,symbol,title,text,points){return{mode,display,symbol,title:p(title[0],title[1]),text:p(text[0],text[1]),points:points.map(x=>({title:p(x[0][0],x[0][1]),text:p(x[1][0],x[1][1])}))}}
function book(title,desc,symbol,role,test,symptom){return[
pg("role",title[0],symbol,title,desc,[[["Role","الدور"],role],[["Boot logic","منطق الإقلاع"],["This step must be understood in the startup chain.","يجب فهم هذه الخطوة داخل سلسلة الإقلاع."]]]),
pg("schema","SCHEMA",symbol,["Schematic Logic","منطق المخطط"],["How this block appears in circuit logic.","كيف يظهر هذا القسم في منطق الدائرة."],[[["Lines","الخطوط"],["Look for input, output, enable and ground.","ابحث عن المدخل، المخرج، التفعيل والأرضي."]]]),
pg("test","TEST",symbol,["How To Test","طريقة الفحص"],test,[[["Method","الطريقة"],["Observe, measure, confirm, then repair.","لاحظ، قس، أكد، ثم أصلح."]]]),
pg("fault","FAULT",symbol,["Common Symptoms","الأعراض الشائعة"],symptom,[[["Warning","تحذير"],["Do not replace ICs before proving the fault.","لا تغير الشرائح قبل إثبات العطل."]]])
]}
function node(id,icon,title,desc,b){return{id,icon,title:p(title[0],title[1]),desc:p(desc[0],desc[1]),book:b}}
const tree=[
{group:p("Foundation","الأساسيات"),nodes:[
node("start","▶",["Start Learning","ابدأ التعلم"],["Understand the order of diagnosis.","افهم ترتيب التشخيص."],book(["Start Learning","ابدأ التعلم"],["Repair starts with logic, not guessing.","الإصلاح يبدأ بالمنطق وليس التخمين."],"START",[["Order","الترتيب"],["Power first, logic second, systems after.","الطاقة أولا، المنطق ثانيا، الأنظمة بعدها."]],["Follow the boot order from battery to systems.","اتبع ترتيب الإقلاع من البطارية إلى الأنظمة."],["Random repair creates new faults.","الإصلاح العشوائي يسبب أعطالا جديدة."]))]},
{group:p("Tools & Components","الأدوات والمكونات"),nodes:[
node("multimeter","V",["Multimeter","الملتيميتر"],["Modes, symbols and usage.","الأوضاع والرموز والاستخدام."],book(["Multimeter","الملتيميتر"],["The main tool for proof-based diagnosis.","الأداة الأساسية للتشخيص بالدليل."],"V Ω DIODE",[["Measure","القياس"],["Voltage, resistance, continuity and diode mode.","الفولت، المقاومة، الاستمرارية والدايود."]],["Use V for voltage, Ω for resistance, diode mode for line comparison.","استخدم V للفولت و Ω للمقاومة ووضع الدايود للمقارنة."],["Wrong mode gives wrong diagnosis.","الوضع الخاطئ يعطي تشخيصا خاطئا."])),
node("components","⚡",["Electronic Components","المكونات الإلكترونية"],["Resistor, capacitor, diode, coil, fuse, connector and IC.","مقاومة، مكثف، دايود، ملف، فيوز، كونكتور وشريحة."],book(["Electronic Components","المكونات الإلكترونية"],["Understand basic parts before systems.","افهم القطع الأساسية قبل الأنظمة."],"R C D L F IC",[["Purpose","الوظيفة"],["Every component has a role in a line or system.","كل مكون له دور في خط أو نظام."]],["Test with the correct multimeter mode depending on the component.","افحص بالوضع الصحيح حسب المكون."],["Replacing without proof is dangerous.","التغيير بدون دليل خطر."]))]},
{group:p("Boot Order / Power Start","ترتيب الإقلاع / بداية الطاقة"),nodes:[
node("battery","BAT",["Battery / VBAT","البطارية / VBAT"],["Main energy source of the phone.","مصدر الطاقة الرئيسي للهاتف."],book(["Battery / VBAT","البطارية / VBAT"],["VBAT feeds the first power path.","VBAT يغذي أول مسار طاقة."],"BAT → VBAT",[["Role","الدور"],["Provides main voltage to the board.","تعطي الفولت الرئيسي للوحة."]],["Measure battery voltage and VBAT line with voltage mode.","قس فولت البطارية وخط VBAT بوضع الفولت."],["No VBAT can mean dead battery, bad connector or broken line.","غياب VBAT قد يعني بطارية ميتة، كونكتور سيئ أو خط مقطوع."])),
node("protection","ESD",["Protection Stage","مرحلة الحماية"],["Fuse, ESD and protection components.","فيوز، ESD ومكونات الحماية."],book(["Protection Stage","مرحلة الحماية"],["Protection comes before sensitive ICs.","الحماية تأتي قبل الشرائح الحساسة."],"VBAT → FUSE → PMIC",[["Role","الدور"],["Protects lines from excess current and static discharge.","تحمي الخطوط من التيار الزائد والكهرباء الساكنة."]],["Check fuses with continuity and ESD lines for shorts.","افحص الفيوز بالاستمرارية وخطوط ESD للشورت."],["A blown fuse cuts the path. A shorted ESD can kill a line.","الفيوز التالف يقطع المسار و ESD الشورت قد يوقف الخط."])),
node("pmic","PMIC",["PMIC","شريحة إدارة الطاقة"],["Main power management IC.","شريحة إدارة الطاقة الرئيسية."],book(["PMIC","شريحة إدارة الطاقة"],["PMIC creates and controls many board voltages.","تنتج وتتحكم في فولتات كثيرة على اللوحة."],"VBAT → PMIC → VDD",[["Role","الدور"],["Generates rails for CPU, memory, display and systems.","تولد خطوط الطاقة للمعالج، الذاكرة، الشاشة والأنظمة."]],["Check VBAT input, enable lines and output rails.","افحص مدخل VBAT، خطوط التفعيل ومخارج الطاقة."],["No output rails can cause total no power.","غياب المخارج قد يسبب موت كامل."])),
node("always_on","AON",["Always-On Rails","خطوط دائمة"],["Small rails active before full boot.","خطوط صغيرة تعمل قبل الإقلاع الكامل."],book(["Always-On Rails","خطوط دائمة"],["Some voltages must exist before pressing power.","بعض الفولتات يجب أن تكون موجودة قبل زر التشغيل."],"PMIC → AON",[["Role","الدور"],["Feed standby logic, power button detection and basic control.","تغذي منطق الاستعداد واكتشاف زر التشغيل والتحكم الأساسي."]],["Measure standby rails in voltage mode.","قس خطوط الاستعداد بوضع الفولت."],["Missing always-on rails can make phone appear totally dead.","غيابها قد يجعل الهاتف يبدو ميتا تماما."])),
node("power_key","PWR",["Power Button Line","خط زر التشغيل"],["Signal that requests startup.","الإشارة التي تطلب التشغيل."],book(["Power Button Line","خط زر التشغيل"],["The button tells PMIC/CPU to start boot.","الزر يخبر PMIC/CPU ببدء الإقلاع."],"PWRKEY → PMIC",[["Role","الدور"],["Pulls or changes a signal when pressed.","يغير إشارة عند الضغط."]],["Check button flex, connector and PWRKEY voltage change.","افحص فلاتة الزر والكونكتور وتغير فولت PWRKEY."],["Bad button line can look like no power.","تلف خط الزر قد يظهر كمشكلة عدم تشغيل."]))]},
{group:p("Logic Boot","إقلاع المنطق"),nodes:[
node("clock","CLK",["Clock / Crystal","الكريستال / الساعة"],["Timing signal needed for logic ICs.","إشارة توقيت تحتاجها الشرائح."],book(["Clock / Crystal","الكريستال / الساعة"],["Logic chips need clock to run correctly.","الشرائح تحتاج الساعة لتعمل."],"XTAL / CLK",[["Role","الدور"],["Provides timing reference for CPU and circuits.","يعطي مرجع توقيت للمعالج والدوائر."]],["Inspect crystal area and related lines. Advanced testing may need oscilloscope.","افحص منطقة الكريستال وخطوطها. الفحص المتقدم قد يحتاج أوسيلوسكوب."],["No clock can stop boot completely.","غياب الساعة قد يوقف الإقلاع تماما."])),
node("cpu","CPU",["CPU / SoC","المعالج"],["Main brain of the phone.","العقل الرئيسي للهاتف."],book(["CPU / SoC","المعالج"],["The CPU starts executing boot logic after power is ready.","يبدأ المعالج تنفيذ الإقلاع بعد جاهزية الطاقة."],"PMIC → CPU",[["Role","الدور"],["Controls system startup and communication with other ICs.","يتحكم في بدء النظام والتواصل مع الشرائح."]],["Do not replace CPU. Check power rails, clock, reset and storage first.","لا تغير المعالج. افحص الطاقة، الساعة، الريست والتخزين أولا."],["CPU faults are advanced and rare compared to power/line faults.","أعطال المعالج متقدمة وأندر من أعطال الطاقة والخطوط."])),
node("ram","RAM",["RAM","الرام"],["Temporary memory used during boot.","ذاكرة مؤقتة تستخدم أثناء الإقلاع."],book(["RAM","الرام"],["RAM helps the CPU load and run early system data.","الرام يساعد المعالج على تحميل وتشغيل بيانات النظام."],"CPU ↔ RAM",[["Role","الدور"],["Temporary working memory.","ذاكرة عمل مؤقتة."]],["Check RAM power rails and surrounding components.","افحص خطوط طاقة الرام والمكونات المحيطة."],["RAM issue can cause no boot or restart.","مشكلة الرام قد تسبب عدم إقلاع أو إعادة تشغيل."])),
node("storage","NAND",["Storage / NAND / UFS","التخزين / NAND / UFS"],["Stores bootloader, system and data.","يحفظ البوتلودر والنظام والبيانات."],book(["Storage / NAND / UFS","التخزين / NAND / UFS"],["The CPU reads boot data from storage.","المعالج يقرأ بيانات الإقلاع من التخزين."],"CPU ↔ NAND/UFS",[["Role","الدور"],["Contains system, firmware and user data.","يحتوي على النظام والفريموير وبيانات المستخدم."]],["Check storage power rails and communication lines.","افحص خطوط الطاقة وخطوط الاتصال الخاصة بالتخزين."],["Storage fault can cause boot loop, no boot or data issues.","عطل التخزين قد يسبب بوت لوب أو عدم إقلاع أو مشاكل بيانات."])),
node("bus","BUS",["Communication Lines","خطوط الاتصال"],["I2C, SPI, UART and control buses.","I2C و SPI و UART وخطوط التحكم."],book(["Communication Lines","خطوط الاتصال"],["ICs talk to each other using communication buses.","الشرائح تتواصل مع بعضها عبر خطوط اتصال."],"I2C / SPI / UART",[["Role","الدور"],["Carry commands and data between CPU and ICs.","تنقل الأوامر والبيانات بين المعالج والشرائح."]],["Check shorts, filters and damaged lines.","افحص الشورت والفلاتر والخطوط التالفة."],["A shorted communication line can block multiple systems.","خط اتصال شورت قد يوقف عدة أنظمة."]))]},

function tr(k){return ui[currentLang][k]}function txt(o){return o[currentLang]}function allNodes(){return tree.flatMap(g=>g.nodes)}function doneIds(){return JSON.parse(localStorage.getItem("master_repair_done")||"[]")}
function saveDone(id){let a=doneIds();if(!a.includes(id))a.push(id);localStorage.setItem("master_repair_done",JSON.stringify(a));localStorage.setItem("master_repair_last",id)}
function isUnlocked(n){let a=allNodes(),i=a.findIndex(x=>x.id===n.id);return i===0||doneIds().includes(a[i-1].id)}
function applyLanguage(){document.documentElement.lang=currentLang;document.documentElement.dir=tr("dir");document.body.dir=tr("dir");let ids={langButton:"langButton",heroTitle:"heroTitle",heroText:"heroText",completedLabel:"completed",stepsLabel:"steps",supportLabel:"support",continueButton:"continue",treeTitle:"treeTitle",treeSubtitle:"treeSubtitle",supportTitle:"supportTitle",supportSubtitle:"supportSubtitle",sosTitle:"sosTitle",sosText:"sosText",sosButton:"sosButton",prevButton:"prev",nextButton:"next",bookBackButton:"back",bookDoneButton:"done",footerText:"footer"};Object.keys(ids).forEach(id=>document.getElementById(id).textContent=tr(ids[id]));document.getElementById("telegramStatus").textContent=tg?tr("connected"):tr("browser");renderTree();if(currentNode&&document.getElementById("bookPage").classList.contains("active"))renderBookPage()}
function toggleLanguage(){currentLang=currentLang==="en"?"ar":"en";localStorage.setItem("master_repair_lang",currentLang);applyLanguage()}
function renderProgress(){let total=allNodes().length,done=doneIds().length,pct=total?Math.round(done/total*100):0;doneCount.textContent=done;totalCount.textContent=total;progressText.textContent=pct+"% "+tr("completedProgress");progressBar.style.width=pct+"%"}
function renderTree(){renderProgress();treeContainer.innerHTML="";tree.forEach(g=>{let t=document.createElement("div");t.className="branch-title";t.textContent=txt(g.group);treeContainer.appendChild(t);let wrap=document.createElement("div");wrap.className="tree";g.nodes.forEach(n=>{let done=doneIds().includes(n.id),unlocked=isUnlocked(n),row=document.createElement("div"),ic=document.createElement("div"),b=document.createElement("button");row.className="tree-node";ic.className="node-icon";ic.textContent=done?"✓":n.icon;b.className="node-card"+(done?" done":"")+(!unlocked?" locked":"");b.onclick=()=>unlocked?openNode(n):showLockedMessage();b.innerHTML=`<strong>${txt(n.title)}</strong><small>${txt(n.desc)}</small><span class="badge">${done?tr("doneState"):unlocked?tr("open"):tr("locked")}</span>`;currentLang==="ar"?(row.append(b),row.append(ic)):(row.append(ic),row.append(b));wrap.append(row)});treeContainer.append(wrap)})}
function openNode(n){currentNode=n;currentBookPage=0;localStorage.setItem("master_repair_last",n.id);renderBookPage();showPage("bookPage")}
function renderBookPage(){let p=currentNode.book[currentBookPage];bookTitle.textContent=txt(currentNode.title);bookDesc.textContent=txt(currentNode.desc);bookCounter.textContent=(currentBookPage+1)+" / "+currentNode.book.length;bookPageTitle.textContent=txt(p.title);bookPageText.textContent=txt(p.text);bookVisual.innerHTML=`<div class="visual"><div class="chip">${p.mode.toUpperCase()}</div><div class="screen">${p.display}</div><div class="symbol">${p.symbol}</div><div class="flow"><div class="pad">IN</div><div class="meter"><div>${p.display}</div></div><div class="pad">OUT</div></div></div>`;bookPoints.innerHTML="";p.points.forEach(x=>{let d=document.createElement("div");d.className="lesson";d.innerHTML=`<strong>${txt(x.title)}</strong><p>${txt(x.text)}</p>`;bookPoints.append(d)});prevButton.disabled=currentBookPage===0;nextButton.disabled=currentBookPage===currentNode.book.length-1}
function previousBookPage(){if(currentBookPage>0){currentBookPage--;renderBookPage();scrollTo(0,0)}}function nextBookPage(){if(currentBookPage<currentNode.book.length-1){currentBookPage++;renderBookPage();scrollTo(0,0)}}
function continueLearning(){let nodes=allNodes(),done=doneIds(),n=nodes.find(x=>!done.includes(x.id)&&isUnlocked(x));if(!n){let last=localStorage.getItem("master_repair_last");n=nodes.find(x=>x.id===last)||nodes[0]}openNode(n)}
function markDone(){if(currentNode){saveDone(currentNode.id);renderProgress()}if(tg&&tg.HapticFeedback)tg.HapticFeedback.notificationOccurred("success");tg&&tg.showAlert?tg.showAlert(tr("completedMessage")):alert(tr("completedMessage"))}
function showLockedMessage(){tg&&tg.showAlert?tg.showAlert(tr("lockedMessage")):alert(tr("lockedMessage"))}
function showPage(id){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById(id).classList.add("active");scrollTo(0,0)}
function goHome(){currentNode=null;renderTree();showPage("home")}function openSOS(){let link="https://t.me/+OVTmcEQLg00zMTQ0";tg&&tg.openTelegramLink?tg.openTelegramLink(link):open(link,"_blank")}
