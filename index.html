<style>
:root{
    --bg:#05070f;
    --surface:#10131e;
    --surface-2:#141a2d;
    --line:rgba(113,129,255,0.18);
    --blue:#3b82f6;
    --purple:#8b5cf6;
    --cyan:#28c4ff;
    --gold:#f9b34d;
    --green:#22c55e;
    --muted:#98a2b3;
    --soft:#d8d8e4;
    --danger:#ef4444;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;width:100%;min-height:100%;font-family:"Manrope","IBM Plex Sans Arabic",Arial,sans-serif;background:radial-gradient(circle at top left,rgba(56,189,248,.15),transparent 23%),radial-gradient(circle at bottom right,rgba(139,92,246,.14),transparent 25%),linear-gradient(180deg,#05070f,#060812);color:#fff;}
body{overflow-x:hidden;}
.app{max-width:620px;margin:0 auto;padding:18px 18px 86px;}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px;}
.brand{display:flex;flex-direction:column;gap:6px;}
.brand-title{font-family:"Orbitron","Manrope",sans-serif;font-size:30px;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:#fff;text-shadow:0 0 18px rgba(56,189,248,.45),0 0 26px rgba(139,92,246,.35);line-height:1;}
.brand-subtitle{font-size:13px;color:var(--muted);letter-spacing:.05em;}
.lang-toggle{min-width:56px;padding:0 14px;height:44px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(17,24,39,.92);color:#fff;font-weight:900;cursor:pointer;box-shadow:0 12px 26px rgba(56,189,248,.12);}
.page{display:none;opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s ease;transform:translateY(10px);}
.page.active{display:block;opacity:1;pointer-events:auto;transform:translateY(0);}
.hero{position:relative;padding:26px;overflow:hidden;border-radius:28px;background:linear-gradient(135deg,rgba(56,189,248,.18),rgba(139,92,246,.18));border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(12px);box-shadow:0 24px 80px rgba(0,0,0,.28);}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(56,189,248,.18),transparent 28%),radial-gradient(circle at bottom left,rgba(139,92,246,.14),transparent 30%);pointer-events:none;}
.hero-title{font-family:"Orbitron","Manrope",sans-serif;font-size:42px;font-weight:900;line-height:1.05;text-transform:uppercase;color:#fff;text-shadow:0 0 26px rgba(56,189,248,.45);margin:0;}
.hero-subtitle{margin:16px 0 0;font-size:15px;line-height:1.8;color:var(--soft);max-width:640px;}
.score-row{display:grid;grid-template-columns:1fr auto;gap:12px;margin-top:22px;}
.card{border:1px solid rgba(255,255,255,.08);border-radius:22px;background:rgba(10,14,27,.96);padding:18px;}
.card strong{display:block;font-size:28px;font-weight:900;color:#fff;line-height:1;}
.card small{color:var(--muted);display:block;margin-top:4px;font-size:13px;}
.progress-wrap{margin-top:22px;height:14px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);overflow:hidden;}
.progress{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .45s ease;}
.section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin:28px 0 14px;}
.section-head h2{margin:0;font-size:20px;font-weight:900;letter-spacing:.02em;}
.section-head p{margin:0;color:var(--muted);font-size:13px;max-width:62%;}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}
.card-block{position:relative;min-height:180px;padding:18px;border:1px solid rgba(255,255,255,.08);border-radius:24px;background:rgba(15,20,35,.96);cursor:pointer;transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;}
.card-block:hover{transform:translateY(-3px);border-color:rgba(56,189,248,.45);box-shadow:0 24px 45px rgba(56,189,248,.12);}
.card-block.locked{cursor:default;opacity:.55;}
.card-block h3{margin:0 0 10px;font-size:18px;line-height:1.2;color:#fff;}
.card-block p{margin:0;color:var(--muted);font-size:13px;line-height:1.75;}
.card-block .badge{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(139,92,246,.14);color:var(--purple);font-size:12px;font-weight:700;margin-top:16px;}
.badge-lock{display:inline-flex;align-items:center;gap:6px;color:var(--blue);}
.level-list{display:grid;gap:12px;margin-top:18px;}
.level-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:16px;border-radius:20px;border:1px solid rgba(255,255,255,.08);background:rgba(10,14,27,.95);cursor:pointer;transition:background .25s ease,border-color .25s ease;}
.level-item.locked{cursor:default;opacity:.55;}
.level-item:hover{background:rgba(56,189,248,.05);border-color:rgba(56,189,248,.25);}
.level-item h3{margin:0;font-size:16px;}
.level-item small{color:var(--muted);}
.level-tag{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.06);color:var(--soft);font-size:12px;font-weight:700;}
.panel-block{border-radius:24px;background:rgba(10,14,27,.96);border:1px solid rgba(255,255,255,.08);padding:22px;margin-top:20px;}
.panel-block h3{margin:0;font-size:22px;line-height:1.1;}
.panel-block p{margin:14px 0 0;font-size:15px;line-height:1.9;color:var(--muted);}
.tip-box{margin-top:20px;padding:18px;border-radius:18px;border:1px solid rgba(56,189,248,.2);background:rgba(56,189,248,.08);}
.tip-box strong{display:block;color:#b5d7ff;font-size:14px;margin-bottom:8px;}
.tip-box p{margin:0;color:var(--soft);font-size:14px;line-height:1.7;}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px;}
.button{display:inline-flex;align-items:center;justify-content:center;min-height:52px;padding:0 18px;border-radius:16px;border:1px solid transparent;font-size:15px;font-weight:900;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease,background .2s ease;}
.button:hover{transform:translateY(-1px);}
.primary-button{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;box-shadow:0 18px 40px rgba(56,189,248,.18);}
.secondary-button{background:rgba(255,255,255,.06);color:#fff;border-color:rgba(255,255,255,.1);}
.outline-button{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.18);}
.button:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.quiz-card{border-radius:24px;background:rgba(10,14,27,.96);border:1px solid rgba(255,255,255,.08);padding:22px;margin-top:20px;}
.quiz-card h3{margin:0;font-size:20px;}
.options{display:grid;gap:12px;margin-top:18px;}
.option-button{padding:16px 18px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff;text-align:left;cursor:pointer;transition:background .2s ease,border-color .2s ease;}
.option-button:hover{background:rgba(56,189,248,.08);border-color:rgba(56,189,248,.35);}
.option-button.correct{border-color:var(--green);background:rgba(34,197,94,.16);}
.option-button.wrong{border-color:var(--danger);background:rgba(239,68,68,.16);}
.option-button.disabled{pointer-events:none;opacity:.75;}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:rgba(10,14,27,.98);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px 18px;color:#fff;font-weight:700;backdrop-filter:blur(8px);box-shadow:0 24px 60px rgba(0,0,0,.35);z-index:10000;animation:toastIn .2s ease forwards;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,6px);}to{opacity:1;transform:translate(-50%,0);} }
.sos-button{position:fixed;right:18px;bottom:18px;z-index:100;min-width:52px;height:52px;border-radius:999px;border:none;background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;font-weight:900;cursor:pointer;box-shadow:0 18px 45px rgba(56,189,248,.25);display:flex;align-items:center;justify-content:center;gap:10px;backdrop-filter:blur(6px);}
.sos-button span{display:none;}
.sos-button::before{content:'SOS';font-size:13px;letter-spacing:.18em;}
@media(min-width:560px){.sos-button span{display:inline-flex;}}
@media(max-width:520px){.section-head{flex-direction:column;align-items:flex-start;} .grid{grid-template-columns:1fr;} .score-row{grid-template-columns:1fr;}}
@media(max-width:420px){.app{padding:16px 12px 96px;} .hero-title{font-size:32px;} .card strong{font-size:24px;} .button{font-size:14px;}}
</style>
</head>

</div>

     {title:{en:'PMIC workflow',ar:'سير عمل PMIC'}, subtitle:{en:'Inspect input, enable and output rails.',ar:'افحص المدخل وإشارات التفعيل ومخارج الطاقة.'}, example:{en:'A dead PMIC often shows no secondary rails.',ar:'PMIC الميت غالبًا لا يظهر خطوطًا ثانوية.'}, tip:{en:'Compare the PMIC area with schematics.',ar:'قارن منطقة PMIC بالمخططات.'}},
     {title:{en:'Storage faults',ar:'أعطال التخزين'}, subtitle:{en:'Check NAND power and data lines.',ar:'افحص طاقة NAND وخطوط البيانات.'}, example:{en:'A bad storage chip can prevent boot completely.',ar:'شريحة تخزين سيئة تمنع الإقلاع تمامًا.'}, tip:{en:'Inspect BGA balls and surrounding filters.',ar:'افحص كرات BGA والفلاتر المحيطة.'}},
     {title:{en:'CPU boot lines',ar:'خطوط إقلاع المعالج'}, subtitle:{en:'Verify clocks, reset and power enable.',ar:'تحقق من الساعة والريست وتفعيل الطاقة.'}, example:{en:'Missing clock can stop the processor from starting.',ar:'غياب الساعة قد يمنع المعالج من البدء.'}, tip:{en:'Use the correct scope probe if available.',ar:'استخدم مجس راسم مناسب إن توفر.'}},
     {title:{en:'RF and antenna',ar:'RF والهوائي'}, subtitle:{en:'Inspect RF paths and antenna connections.',ar:'افحص مسارات RF وتوصيلات الهوائي.'}, example:{en:'A broken antenna track can kill reception.',ar:'مسار هوائي مكسور يمكن أن يقتل الاستقبال.'}, tip:{en:'Avoid touching RF filters with bare hands.',ar:'تجنب لمس فلاتر RF بالأيدي العارية.'}},
     {title:{en:'Thermal damage',ar:'تلف الحرارة'}, subtitle:{en:'Check for overheated chips and burned traces.',ar:'افحص الشرائح الساخنة والمسارات المحروقة.'}, example:{en:'Dark areas often point to heat damage.',ar:'المناطق الداكنة غالبًا تشير إلى تلف حراري.'}, tip:{en:'Cool the board gradually to prevent warpage.',ar:'برد اللوحة تدريجياً لتجنب الالتواء.'}}
  ], quiz:[
     {question:{en:'PMIC diagnosis starts with:',ar:'تشخيص PMIC يبدأ بـ:'}, options:[{en:'Display test',ar:'اختبار الشاشة'},{en:'VBAT and enable signals',ar:'VBAT وإشارات التفعيل'},{en:'Speaker check',ar:'اختبار السماعة'}], answer:1},
     {question:{en:'Storage faults usually affect:',ar:'أعطال التخزين عادة تؤثر على:'}, options:[{en:'Boot process',ar:'عملية الإقلاع'},{en:'Screen brightness',ar:'سطوع الشاشة'},{en:'Audio quality',ar:'جودة الصوت'}], answer:0},
     {question:{en:'RF issues can come from:',ar:'مشاكل RF يمكن أن تأتي من:'}, options:[{en:'Broken antenna track',ar:'مسار هوائي مكسور'},{en:'Bad battery',ar:'بطارية سيئة'},{en:'Dirty screen',ar:'شاشة متسخة'}], answer:0}
  ]}
];
let state = loadState();
let currentChapter = null;
let currentLevel = null;
let currentQuiz = null;
let quizIndex = 0;
let quizScore = 0;
function loadState(){
  const saved = localStorage.getItem(storageKeys.state);
  if(!saved) return {xp:0, completedLevels:{}, quizPassed:[], unlocked:['tools']};
  try{return JSON.parse(saved);}catch{return {xp:0, completedLevels:{}, quizPassed:[], unlocked:['tools']};}
}
function saveState(){localStorage.setItem(storageKeys.state, JSON.stringify(state));}
function saveLang(){localStorage.setItem(storageKeys.lang, stateLang);}
let stateLang = localStorage.getItem(storageKeys.lang) || 'en';
function t(key){return translations[stateLang][key] || '';}
function txt(item){return item ? item[stateLang] || '' : '';}
function isUnlocked(id){return state.unlocked.includes(id);} 
function completedLevels(chapter){return state.completedLevels[chapter.id] || [];}
function levelDone(chapter,index){return completedLevels(chapter).includes(index);}
function nextAvailableLevel(chapter){const done=completedLevels(chapter);return chapter.levels.findIndex((_,i)=>!done.includes(i));}
function chapterPercent(chapter){return Math.round((completedLevels(chapter).length/chapter.levels.length)*100);} 
function chapterQuizReady(chapter){return completedLevels(chapter).length===chapter.levels.length;}
function chapterPassed(chapter){return state.quizPassed.includes(chapter.id);}
function unlockChapter(id){if(!state.unlocked.includes(id)){state.unlocked.push(id); saveState();}}
function unlockNextChapter(currentId){const index=chapters.findIndex(item=>item.id===currentId); if(index!==-1 && index<chapters.length-1){unlockChapter(chapters[index+1].id);}}
function addXP(amount){state.xp += amount; saveState();}
function showToast(message){const toast=document.createElement('div');toast.className='toast';toast.textContent=message;document.body.appendChild(toast);setTimeout(()=>toast.remove(),2400);}
function setDir(){document.documentElement.lang=stateLang;document.documentElement.dir=translations[stateLang].dir;}
function renderCurrentPage(){setDir(); document.getElementById('langButton').textContent=stateLang.toUpperCase(); renderHome(); if(document.getElementById('chapterPage').classList.contains('active')) renderChapter(); if(document.getElementById('levelPage').classList.contains('active')) renderLevel(); if(document.getElementById('quizPage').classList.contains('active')) renderQuiz(); updateTelegramButton(); document.getElementById('sosLabel').textContent=t('sos');}
function updateTelegramButton(){if(!tg || !tg.MainButton) return; tg.MainButton.setText(t('telegramMain')); if(document.getElementById('homePage').classList.contains('active')){tg.MainButton.show(); tg.MainButton.onClick = continueLearning;} else {tg.MainButton.hide();}}
function showPage(id){document.querySelectorAll('.page').forEach(page=>page.classList.remove('active'));document.getElementById(id).classList.add('active'); renderCurrentPage();}
function openChapter(id){currentChapter = getChapterById(id); currentLevel = nextAvailableLevel(currentChapter); renderChapter(); showPage('chapterPage');}
function getChapterById(id){return chapters.find(ch=>ch.id===id);} 
function renderHome(){document.getElementById('brandTitle').textContent=t('brand');document.getElementById('brandSubtitle').textContent=t('subtitle');document.getElementById('heroTitle').textContent=t('hero');document.getElementById('heroSubtitle').textContent=t('homeText');document.getElementById('xpLabel').textContent=t('xp');document.getElementById('xpValue').textContent=state.xp;document.getElementById('progressLabel').textContent=t('progress');const totalLevels=chapters.reduce((sum,c)=>sum+c.levels.length,0);const doneLevels=chapters.reduce((sum,c)=>sum+completedLevels(c).length,0);const percent=totalLevels?Math.round((doneLevels/totalLevels)*100):0;document.getElementById('progressText').textContent=`${percent}%`;document.getElementById('globalProgress').style.width=`${percent}%`;document.getElementById('homeSectionTitle').textContent=t('homeTitle');document.getElementById('homeSectionText').textContent=t('homeText');const grid=document.getElementById('chapterGrid');grid.innerHTML='';chapters.forEach(ch=>{const card=document.createElement('button');card.type='button';card.className='card-block'+(isUnlocked(ch.id)?'':' locked');if(isUnlocked(ch.id)){card.onclick=()=>openChapter(ch.id);} const progress=`${completedLevels(ch).length}/${ch.levels.length}`;const lockLabel=isUnlocked(ch.id)?t('chapterOpen'):t('chapterLocked');card.innerHTML=`<h3>${txt(ch.title)}</h3><p>${txt(ch.description)}</p><div class="badge">${progress} • ${lockLabel}</div>`;grid.appendChild(card);});}
function renderChapter(){document.getElementById('chapterTitle').textContent=txt(currentChapter.title);document.getElementById('chapterText').textContent=txt(currentChapter.description);document.getElementById('backToHomeButton').textContent=t('back');const levelList=document.getElementById('levelList');levelList.innerHTML='';const nextLevelIndex=nextAvailableLevel(currentChapter);currentChapter.levels.forEach((level,index)=>{const item=document.createElement('button');item.type='button';item.className='level-item'+((index!==nextLevelIndex && !levelDone(currentChapter,index))?' locked':''); if(!(index!==nextLevelIndex && !levelDone(currentChapter,index))){item.onclick=()=>openLevel(index);} const status=levelDone(currentChapter,index)?t('chapterDone'):index===nextLevelIndex?t('levelReady'):t('chapterLocked'); item.innerHTML=`<div><h3>${txt(level.title)}</h3><small>${txt(level.subtitle)}</small></div><div class="level-tag">${status}</div>`;levelList.appendChild(item);});document.getElementById('startLevelButton').textContent=t('chapterStart');document.getElementById('chapterQuizButton').textContent=t('chapterQuiz');document.getElementById('chapterQuizButton').disabled = !chapterQuizReady(currentChapter);document.getElementById('chapterQuizButton').title = chapterQuizReady(currentChapter) ? '' : t('quizLocked');}
function openLevel(index){currentLevel=index; renderLevel(); showPage('levelPage');}
function renderLevel(){const level=currentChapter.levels[currentLevel];document.getElementById('levelTitle').textContent=txt(level.title);document.getElementById('levelSubtitle').textContent=txt(level.subtitle);document.getElementById('tipLabel').textContent=t('levelTip');document.getElementById('levelTip').textContent=txt(level.tip);document.getElementById('completeLevelButton').textContent=levelDone(currentChapter,currentLevel)?t('next'):t('complete');document.getElementById('returnToChapterButton').textContent=t('back');}
function completeLevel(chapterId,index){const chapter=getChapterById(chapterId); if(levelDone(chapter,index)) {const next=index+1<chapter.levels.length?index+1:index; if(next<chapter.levels.length){openLevel(next);} return;} const completed=completedLevels(chapter);completed.push(index);state.completedLevels[chapter.id]=completed;addXP(15);saveState(); showToast(t('levelCompleted')); renderLevel(); renderChapter(); renderHome();}
function openQuiz(chapterId){currentChapter=getChapterById(chapterId);currentQuiz=currentChapter.quiz;quizIndex=0;quizScore=0;renderQuiz();showPage('quizPage');}
function renderQuiz(){document.getElementById('quizTitle').textContent=`${t('quiz')} • ${txt(currentChapter.title)}`;document.getElementById('quizSubtitle').textContent=t('quizSubtitle');const card=document.getElementById('quizCard');card.innerHTML='';const q=currentQuiz[quizIndex];const question=document.createElement('div');question.innerHTML=`<h3>${txt(q.question)}</h3>`;card.appendChild(question);const options=document.createElement('div');options.className='options';q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.type='button';btn.className='option-button';btn.innerHTML=`${txt(opt)}`;btn.onclick=()=>answerQuiz(i);options.appendChild(btn);});card.appendChild(options);const actions=document.getElementById('quizActions');actions.innerHTML='';}
function answerQuiz(answerIndex){const q=currentQuiz[quizIndex];const buttons=[...document.querySelectorAll('.option-button')];buttons.forEach((btn,i)=>{btn.classList.add('disabled'); if(i===q.answer){btn.classList.add('correct');} if(i===answerIndex && i!==q.answer){btn.classList.add('wrong');}}); if(answerIndex===q.answer){quizScore++; showToast('✓');} else {showToast('✗');} setTimeout(()=>{quizIndex++; if(quizIndex>=currentQuiz.length){finishQuiz();} else {renderQuiz();}},600);}
function finishQuiz(){const card=document.getElementById('quizCard');const actions=document.getElementById('quizActions');const passed = quizScore >= Math.ceil(currentQuiz.length * 0.7); card.innerHTML=`<h3>${t('quizResult')}</h3><p>${t('quizScore')}: ${quizScore}/${currentQuiz.length}</p><p>${passed? t('quizPass'): t('quizFail')}</p>`;actions.innerHTML='';const btn=document.createElement('button');btn.type='button';btn.className='button primary-button';btn.textContent=passed? t('quizReturn'):t('quizRetry'); btn.onclick=()=>{ if(passed){if(!state.quizPassed.includes(currentChapter.id)){state.quizPassed.push(currentChapter.id);} addXP(30); unlockNextChapter(currentChapter.id); saveState(); showPage('chapterPage'); renderChapter(); renderHome(); } else {quizIndex=0;quizScore=0; renderQuiz(); }};actions.appendChild(btn);}
function continueLearning(){const available=chapters.find(ch=>isUnlocked(ch.id) && nextAvailableLevel(ch)!==-1); if(available){openChapter(available.id);} else {const nextUnlock = chapters.find(ch=>isUnlocked(ch.id) && !chapterQuizReady(ch)); if(nextUnlock){openChapter(nextUnlock.id);} else {const firstUnlocked=chapters.find(ch=>isUnlocked(ch.id)); if(firstUnlocked) openChapter(firstUnlocked.id);} }}
function init(){setDir(); document.getElementById('langButton').textContent=stateLang.toUpperCase(); document.getElementById('langButton').addEventListener('click', ()=>{stateLang = stateLang==='en'?'ar':'en'; saveLang(); renderCurrentPage();}); document.getElementById('backToHomeButton').addEventListener('click', ()=>{showPage('homePage');}); document.getElementById('returnToChapterButton').addEventListener('click', ()=>{showPage('chapterPage');}); document.getElementById('startLevelButton').addEventListener('click', ()=>{if(currentChapter){const next=nextAvailableLevel(currentChapter); if(next!==-1) openLevel(next);}}); document.getElementById('chapterQuizButton').addEventListener('click', ()=>{if(currentChapter && chapterQuizReady(currentChapter)){openQuiz(currentChapter.id);}}); document.getElementById('sosButton').addEventListener('click', ()=>{window.open('https://t.me/c/3919937885/2','_blank');}); if(tg && tg.MainButton){tg.ready(); tg.MainButton.setText(t('telegramMain')); tg.MainButton.show(); tg.onEvent('mainButtonClicked', ()=>{ if(document.getElementById('homePage').classList.contains('active')) continueLearning(); });}
 renderCurrentPage(); }
init();
</script>
</body>
