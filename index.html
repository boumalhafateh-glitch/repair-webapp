<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Master Repair Academy • Encyclopédie Pro</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

:root {
    --bg: #0a0a0c;
    --surface: #111215;
    --surface-elevated: #1a1c20;
    --border: #2a2c30;
    --text: #ededee;
    --text-secondary: #8e8e93;
    --accent: #f2c94c;
    --accent-glow: rgba(242, 201, 76, 0.2);
    --cyan: #38bdf8;
    --cyan-glow: rgba(56, 189, 248, 0.15);
    --green: #27c46b;
    --red: #ff4d4d;
    --purple: #a855f7;
    --orange: #f97316;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'IBM Plex Sans Arabic', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
}

.app {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px 16px 24px;
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(0.98); }
}

@keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}

.page {
    animation: fadeIn 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.page.active {
    display: block;
}

.page:not(.active) {
    display: none;
}

/* Top Bar */
.top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding: 8px 0;
}

.logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--accent), #ffd966);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    color: #0a0a0c;
    box-shadow: 0 6px 14px var(--accent-glow);
}

.logo-text h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
}

.logo-text h1 span {
    color: var(--accent);
}

.logo-text .status {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
}

.top-actions {
    display: flex;
    gap: 10px;
}

.icon-btn {
    width: 42px;
    height: 42px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.icon-btn:active {
    transform: scale(0.94);
    background: var(--surface-elevated);
}

/* Cards */
.hero-card, .panel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 16px;
    transition: all 0.2s;
}

.hero-card {
    background: linear-gradient(135deg, var(--surface), #0f0f13);
    border-bottom: 2px solid var(--accent);
}

.title-lg {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
}

.text-muted {
    color: var(--text-secondary);
    font-size: 14px;
}

.progress-container {
    margin-top: 16px;
}

.progress-bar-bg {
    background: var(--surface-elevated);
    border-radius: 30px;
    height: 8px;
    overflow: hidden;
}

.progress-fill {
    background: linear-gradient(90deg, var(--cyan), var(--accent), var(--green));
    width: 0%;
    height: 100%;
    border-radius: 30px;
    transition: width 0.4s ease;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
}

.stat-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 12px 6px;
    text-align: center;
}

.stat-value {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
}

.stat-label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
}

/* Buttons */
.btn {
    border: none;
    border-radius: 16px;
    padding: 12px 16px;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.btn-primary {
    background: linear-gradient(135deg, var(--accent), #e5b830);
    color: #0a0a0c;
    box-shadow: 0 2px 8px var(--accent-glow);
}

.btn-primary:active {
    transform: scale(0.96);
    box-shadow: 0 1px 4px var(--accent-glow);
}

.btn-secondary {
    background: var(--surface-elevated);
    border: 1px solid var(--border);
    color: var(--text);
}

.btn-secondary:active {
    background: var(--surface);
}

.btn-danger {
    background: rgba(255, 77, 77, 0.15);
    border: 1px solid rgba(255, 77, 77, 0.4);
    color: var(--red);
}

.btn-full {
    width: 100%;
}

/* Action row */
.action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 16px 0;
}

/* Branch & Chapter cards */
.branch-grid, .chapter-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 16px;
}

.branch-card, .chapter-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    transition: all 0.2s;
    cursor: pointer;
    text-align: center;
}

.branch-card:active, .chapter-card:active {
    transform: scale(0.98);
    background: var(--surface-elevated);
}

.branch-card.done, .chapter-card.done {
    border-color: var(--green);
    background: rgba(39, 196, 107, 0.05);
}

.branch-title {
    font-size: 17px;
    font-weight: 700;
}

.branch-desc {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 6px 0 8px;
}

.badge {
    display: inline-block;
    background: rgba(242, 201, 76, 0.12);
    padding: 4px 10px;
    border-radius: 30px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
}

/* Lesson book */
.book-nav {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin: 16px 0;
}

.lesson-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 16px 0;
}

.lesson-item {
    background: var(--surface-elevated);
    border-radius: 16px;
    padding: 16px;
}

.lesson-item strong {
    display: block;
    font-size: 15px;
    margin-bottom: 6px;
}

.lesson-item p {
    font-size: 13px;
    color: var(--text-secondary);
}

/* Search */
.search-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 12px 18px;
    width: 100%;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    margin-bottom: 20px;
}

.search-bar:focus {
    outline: none;
    border-color: var(--accent);
}

/* SOS */
.sos-card {
    background: rgba(255, 77, 77, 0.05);
    border: 1px solid rgba(255, 77, 77, 0.3);
}

/* Footer */
.footer {
    text-align: center;
    font-size: 11px;
    color: var(--text-secondary);
    padding: 24px 0 12px;
}

/* Encyclopedia */
.encyclopedia-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.encyclopedia-category {
    background: var(--surface);
    border-radius: 20px;
    padding: 16px;
    border: 1px solid var(--border);
}

.category-header {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
}

.category-items {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.category-tag {
    background: var(--surface-elevated);
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.1s;
}

.category-tag:active {
    transform: scale(0.94);
    background: var(--accent);
    color: #0a0a0c;
}

/* Responsive */
@media (max-width: 480px) {
    .app {
        padding: 12px;
    }
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <div class="logo-area">
            <div class="logo-icon">⌁</div>
            <div class="logo-text">
                <h1><span>MASTER</span> REPAIR</h1>
                <div class="status" id="telegramStatus"></div>
            </div>
        </div>
        <div class="top-actions">
            <button class="icon-btn" onclick="toggleLanguage()" id="langButton">AR</button>
            <button class="icon-btn" onclick="showEncyclopedia()">📚</button>
        </div>
    </div>

    <!-- HOME PAGE -->
    <div id="homePage" class="page active">
        <div class="hero-card">
            <div class="title-lg" id="heroTitle">Encyclopédie Réparation</div>
            <div class="text-muted" id="heroText">Maîtrisez chaque outil, composant et panne</div>
            <div class="progress-container">
                <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
                <div class="text-muted" style="margin-top: 8px;" id="progressText">0% complété</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><div class="stat-value" id="doneCount">0</div><div class="stat-label" id="completedLabel">Complétés</div></div>
            <div class="stat-item"><div class="stat-value" id="totalCount">0</div><div class="stat-label" id="stepsLabel">Leçons</div></div>
            <div class="stat-item"><div class="stat-value" id="pointsCount">0</div><div class="stat-label">Points</div></div>
            <div class="stat-item"><div class="stat-value" id="streakCount">0</div><div class="stat-label">Série</div></div>
        </div>

        <button class="btn btn-primary btn-full" onclick="continueLearning()" id="continueBtn">Continuer l'apprentissage</button>

        <div class="action-row">
            <button class="btn btn-secondary" onclick="startQuickQuiz()">⚡ Quiz rapide</button>
            <button class="btn btn-secondary" onclick="showEncyclopedia()">📖 Encyclopédie</button>
        </div>

        <div class="section-title" style="margin: 24px 0 12px;"><h3 id="branchesTitle">Branches</h3></div>
        <div id="branchList" class="branch-grid"></div>

        <div class="sos-card panel-card" style="margin-top: 20px;">
            <div style="font-weight: 700; margin-bottom: 6px;" id="sosTitle">SOS Support</div>
            <div class="text-muted" style="margin-bottom: 12px;" id="sosText">Besoin d'aide ?</div>
            <button class="btn btn-danger btn-full" onclick="openSOS()" id="sosButton">Ouvrir le groupe</button>
        </div>

        <div class="footer" id="footerText">Master Repair Academy • Édition Encyclopédique</div>
    </div>

    <!-- BRANCH PAGE -->
    <div id="branchPage" class="page">
        <div class="panel-card"><div class="title-lg" id="branchTitle"></div><div class="text-muted" id="branchDesc"></div><div class="badge" id="branchProgress"></div></div>
        <div id="chapterList" class="chapter-grid"></div>
        <button class="btn btn-secondary btn-full" style="margin-top: 16px;" onclick="goHome()">← Retour</button>
    </div>

    <!-- BOOK PAGE -->
    <div id="bookPage" class="page">
        <div class="panel-card"><div class="title-lg" id="bookTitle"></div><div class="text-muted" id="bookDesc"></div><div class="badge" id="bookCounter"></div></div>
        <div id="bookVisual"></div>
        <div class="panel-card"><div class="title-lg" id="bookPageTitle"></div><div class="text-muted" id="bookPageText"></div></div>
        <div id="bookPoints" class="lesson-list"></div>
        <div class="book-nav"><button class="btn btn-secondary" id="prevBtn" onclick="prevPage()">◀ Précédent</button><button class="btn btn-secondary" id="nextBtn" onclick="nextPage()">Suivant ▶</button></div>
        <div class="action-row"><button class="btn btn-secondary" onclick="goBranch()">← Chapitres</button><button class="btn btn-primary" onclick="markDone()">✅ Valider +25 pts</button></div>
    </div>

    <!-- ENCYCLOPEDIA PAGE -->
    <div id="encyclopediaPage" class="page">
        <div class="panel-card"><div class="title-lg">📚 Encyclopédie</div><input type="text" class="search-bar" id="encySearch" placeholder="Rechercher un outil, composant..." onkeyup="filterEncyclopedia()"></div>
        <div id="encyclopediaContent" class="encyclopedia-grid"></div>
        <button class="btn btn-secondary btn-full" style="margin-top: 16px;" onclick="goHome()">Retour</button>
    </div>

    <!-- QUIZ PAGE -->
    <div id="quizPage" class="page">
        <div class="panel-card"><div class="title-lg">⚡ Quiz express</div><div id="quizQuestion" class="title-lg" style="font-size: 20px; margin: 16px 0;"></div><div id="quizOptions" class="lesson-list"></div><div class="action-row"><button class="btn btn-secondary" onclick="goHome()">Quitter</button><button class="btn btn-primary" id="quizNextBtn" onclick="nextQuiz()">Question suivante</button></div></div>
    </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); }

// LANGUE (inchangée structure)
let currentLang = localStorage.getItem("lang") || "en";
const labels = {
    en: { langBtn: "AR", status: tg ? "✅ Connected" : "🌐 Test", heroTitle: "📱 Repair Encyclopedia", heroText: "Tools, components, failures — complete", completed: "Done", steps: "Total", continue: "Continue", branches: "Learning Paths", sos: "SOS", sosText: "Join Telegram group", sosBtn: "Open Group", back: "Back", done: "Complete", prev: "◀ Prev", next: "Next ▶", footer: "Master Repair • Pro Edition" },
    ar: { langBtn: "EN", status: tg ? "✅ متصل" : "🌐 تجريبي", heroTitle: "📱 موسوعة الإصلاح", heroText: "الأدوات، المكونات، الأعطال — كاملة", completed: "مكتمل", steps: "الكل", continue: "واصل", branches: "مسارات التعلم", sos: "دعم", sosText: "انضم لمجموعة تيليجرام", sosBtn: "افتح المجموعة", back: "رجوع", done: "تم", prev: "◀ السابق", next: "التالي ▶", footer: "ماستر ريبير • نسخة احترافية" }
};
function t(k){ return labels[currentLang][k] || labels.en[k]; }
function applyLang(){
    document.getElementById("langButton").innerText = labels[currentLang].langBtn;
    document.getElementById("telegramStatus").innerText = labels[currentLang].status;
    document.getElementById("heroTitle").innerText = labels[currentLang].heroTitle;
    document.getElementById("heroText").innerText = labels[currentLang].heroText;
    document.getElementById("completedLabel").innerText = labels[currentLang].completed;
    document.getElementById("stepsLabel").innerText = labels[currentLang].steps;
    document.getElementById("continueBtn").innerText = labels[currentLang].continue;
    document.getElementById("branchesTitle").innerText = labels[currentLang].branches;
    document.getElementById("sosTitle").innerText = labels[currentLang].sos;
    document.getElementById("sosText").innerText = labels[currentLang].sosText;
    document.getElementById("sosButton").innerText = labels[currentLang].sosBtn;
    document.getElementById("prevBtn").innerText = labels[currentLang].prev;
    document.getElementById("nextBtn").innerText = labels[currentLang].next;
    document.getElementById("footerText").innerText = labels[currentLang].footer;
    renderHome();
}
function toggleLanguage(){ currentLang = currentLang === "en" ? "ar" : "en"; localStorage.setItem("lang", currentLang); applyLang(); }

// DONNÉES COMPLÈTES (encyclopédie)
const toolList = [
    "Multimètre", "Fer à souder", "Station air chaud", "Microscope", "Pince à épiler", "Pompe à dessouder", "Banc d'alimentation", "Plaque chauffante", "Kapton", "Flux", "Câble de test", "Loupe binoculaire", "Tournevis de précision", "Pince antistatique", "Brosse ESD", "Alcool isopropylique", "Fil à jumper", "Pinces à sertir", "Testeur de batterie", "Caméra thermique"
];
const componentList = [
    "Résistance", "Condensateur", "Diode", "Bobine", "Fusible", "Connecteur", "IC (circuit intégré)", "Transistor MOSFET", "Régulateur de tension", "Quartz", "PMIC", "CPU", "NAND Flash", "Audio Codec", "Antenne", "Filtre", "Protection ESD", "Batterie Li-Ion", "Écran OLED", "Moteur vibrateur"
];
const failureList = [
    "Pas de tension VBAT", "Court-circuit sur VDD", "Pas de démarrage", "Bootloop", "Écran noir", "Son absent", "Charge lente", "Chauffe excessive", "Micro qui siffle", "Wi-Fi / Bluetooth faible", "IMEI absent", "Décharge rapide", "Port USB cassé", "Fuite de courant", "Oxydation", "Piste coupée", "Composant fissuré", "Soudure cassée", "Mauvais contact connecteur", "Logiciel corrompu"
];

// PROGRESSION & POINTS
let userPoints = parseInt(localStorage.getItem("points") || "0");
let streak = parseInt(localStorage.getItem("streak") || "0");
let lastDate = localStorage.getItem("lastDate") || "";
function updateStreak(){
    let today = new Date().toISOString().slice(0,10);
    if(lastDate !== today){
        if(lastDate !== "") streak++;
        else streak = 1;
        lastDate = today;
        localStorage.setItem("lastDate", today);
        localStorage.setItem("streak", streak);
    }
    document.getElementById("streakCount").innerText = streak;
}
function addPoints(p){ userPoints+=p; localStorage.setItem("points", userPoints); document.getElementById("pointsCount").innerText = userPoints; if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success"); }

// LEÇONS CONSTRUITES
let allLessons = [];
let branchesList = [
    { id: "tools", nameEn: "🔧 Tools", nameAr: "🔧 الأدوات", descEn: "Master 20+ essential tools", descAr: "اتقن 20+ أداة أساسية", list: toolList.map((t,i) => ({ id: "tool"+i, nameEn: t, nameAr: t, contentEn: `How to use ${t} safely and efficiently.`, contentAr: `كيف تستخدم ${t} بأمان وفعالية.`, icon: "🔧" })) },
    { id: "components", nameEn: "⚡ Components", nameAr: "⚡ المكونات", descEn: "Understand every electronic part", descAr: "افهم كل قطعة إلكترونية", list: componentList.map((c,i) => ({ id: "comp"+i, nameEn: c, nameAr: c, contentEn: `Role, testing, and common failures of ${c}.`, contentAr: `دور، فحص، وأعطال ${c} الشائعة.`, icon: "💡" })) },
    { id: "failures", nameEn: "⚠️ Failures", nameAr: "⚠️ الأعطال", descEn: "Diagnose & fix real issues", descAr: "شخص وأصلح مشاكل حقيقية", list: failureList.map((f,i) => ({ id: "fail"+i, nameEn: f, nameAr: f, contentEn: `Symptoms, causes, and repair for ${f}.`, contentAr: `الأعراض، الأسباب، وإصلاح ${f}.`, icon: "🔍" })) }
];
branchesList.forEach(b => { b.list.forEach(l => { allLessons.push({ id: l.id, branchId: b.id, nameEn: l.nameEn, nameAr: l.nameAr, contentEn: l.contentEn, contentAr: l.contentAr, icon: l.icon }); }); });

function doneIds(){ return JSON.parse(localStorage.getItem("done") || "[]"); }
function saveDone(id){
    let d = doneIds();
    if(!d.includes(id)){ d.push(id); localStorage.setItem("done", JSON.stringify(d)); addPoints(25); }
}
function progressCount(){ return doneIds().length; }
function totalCount(){ return allLessons.length; }
function renderHome(){
    updateStreak();
    let done = progressCount(), total = totalCount();
    document.getElementById("doneCount").innerText = done;
    document.getElementById("totalCount").innerText = total;
    document.getElementById("pointsCount").innerText = userPoints;
    let pct = total ? Math.round(done/total*100) : 0;
    document.getElementById("progressFill").style.width = pct+"%";
    document.getElementById("progressText").innerHTML = pct+"% "+labels[currentLang].completed;
    let container = document.getElementById("branchList");
    container.innerHTML = "";
    branchesList.forEach(b => {
        let branchDone = b.list.filter(l => doneIds().includes(l.id)).length;
        let branchTotal = b.list.length;
        let branchPct = branchTotal ? Math.round(branchDone/branchTotal*100) : 0;
        let card = document.createElement("div");
        card.className = "branch-card" + (branchDone === branchTotal ? " done" : "");
        card.innerHTML = `<div class="branch-title">${currentLang === "en" ? b.nameEn : b.nameAr}</div><div class="branch-desc">${currentLang === "en" ? b.descEn : b.descAr}</div><span class="badge">${branchDone}/${branchTotal}</span><div class="progress-bar-bg" style="margin-top: 10px;"><div class="progress-fill" style="width: ${branchPct}%; background: var(--accent); height: 4px;"></div></div>`;
        card.onclick = () => openBranch(b.id);
        container.appendChild(card);
    });
}
function openBranch(id){
    currentBranch = branchesList.find(b => b.id === id);
    renderBranch();
    showPage("branchPage");
}
let currentBranch = null, currentNode = null, currentBookPage = 0;
function renderBranch(){
    document.getElementById("branchTitle").innerHTML = currentLang === "en" ? currentBranch.nameEn : currentBranch.nameAr;
    document.getElementById("branchDesc").innerHTML = currentLang === "en" ? currentBranch.descEn : currentBranch.descAr;
    let done = currentBranch.list.filter(l => doneIds().includes(l.id)).length;
    document.getElementById("branchProgress").innerHTML = `${done}/${currentBranch.list.length} ${labels[currentLang].completed}`;
    let container = document.getElementById("chapterList");
    container.innerHTML = "";
    currentBranch.list.forEach(l => {
        let isDone = doneIds().includes(l.id);
        let card = document.createElement("div");
        card.className = "chapter-card" + (isDone ? " done" : "");
        card.innerHTML = `<div class="branch-title">${l.icon} ${currentLang === "en" ? l.nameEn : l.nameAr}</div><span class="badge">${isDone ? "✅" : "📘"}</span>`;
        card.onclick = () => openLesson(l);
        container.appendChild(card);
    });
}
function openLesson(lesson){
    currentNode = { id: lesson.id, name: currentLang === "en" ? lesson.nameEn : lesson.nameAr, content: currentLang === "en" ? lesson.contentEn : lesson.contentAr, pages: [{ title: "📘 Leçon", text: lesson.contentEn }] };
    if(currentLang === "ar") currentNode.pages[0].text = lesson.contentAr;
    currentBookPage = 0;
    renderBook();
    showPage("bookPage");
}
function renderBook(){
    let page = currentNode.pages[currentBookPage];
    document.getElementById("bookTitle").innerHTML = currentNode.name;
    document.getElementById("bookDesc").innerHTML = "📖 " + (currentLang === "en" ? "Detailed lesson" : "درس مفصل");
    document.getElementById("bookCounter").innerHTML = `${currentBookPage+1}/${currentNode.pages.length}`;
    document.getElementById("bookPageTitle").innerHTML = page.title;
    document.getElementById("bookPageText").innerHTML = page.text;
    document.getElementById("bookVisual").innerHTML = `<div style="text-align: center; font-size: 48px; padding: 16px;">🔧📚⚡</div>`;
    let pointsDiv = document.getElementById("bookPoints");
    pointsDiv.innerHTML = `<div class="lesson-item"><strong>💡 Astuce</strong><p>${currentLang === "en" ? "Practice makes perfect! Review this lesson again tomorrow." : "الممارسة تؤدي إلى الإتقان! راجع هذا الدرس غدًا."}</p></div>`;
    document.getElementById("prevBtn").disabled = currentBookPage === 0;
    document.getElementById("nextBtn").disabled = currentBookPage === currentNode.pages.length-1;
}
function prevPage(){ if(currentBookPage > 0){ currentBookPage--; renderBook(); } }
function nextPage(){ if(currentBookPage < currentNode.pages.length-1){ currentBookPage++; renderBook(); } }
function markDone(){
    if(currentNode && !doneIds().includes(currentNode.id)){
        saveDone(currentNode.id);
        addPoints(25);
        if(tg?.showAlert) tg.showAlert("✅ +25 points ! Leçon complétée.");
        else alert("✅ +25 points !");
    }
    goBranch();
}
function continueLearning(){
    let next = allLessons.find(l => !doneIds().includes(l.id));
    if(next){
        let branch = branchesList.find(b => b.list.some(l => l.id === next.id));
        if(branch){ openBranch(branch.id); setTimeout(() => { let lesson = branch.list.find(l => l.id === next.id); if(lesson) openLesson(lesson); }, 100); }
    } else { if(tg?.showAlert) tg.showAlert("🏆 Félicitations ! Tu as tout complété !"); else alert("🏆 Félicitations !"); }
}
function showEncyclopedia(){
    let container = document.getElementById("encyclopediaContent");
    let categories = [
        { name: "🔧 Outils", items: toolList },
        { name: "⚡ Composants", items: componentList },
        { name: "⚠️ Pannes", items: failureList }
    ];
    container.innerHTML = categories.map(cat => `<div class="encyclopedia-category"><div class="category-header">${cat.name}</div><div class="category-items">${cat.items.map(it => `<span class="category-tag" onclick="searchAndOpen('${it}')">${it}</span>`).join("")}</div></div>`).join("");
    showPage("encyclopediaPage");
}
function filterEncyclopedia(){
    let term = document.getElementById("encySearch").value.toLowerCase();
    let cats = document.querySelectorAll(".encyclopedia-category");
    cats.forEach(cat => {
        let tags = cat.querySelectorAll(".category-tag");
        let visible = false;
        tags.forEach(t => { if(t.innerText.toLowerCase().includes(term)){ t.style.display = "inline-block"; visible=true; } else t.style.display = "none"; });
        cat.style.display = visible ? "block" : "none";
    });
}
function searchAndOpen(term){
    let lesson = allLessons.find(l => l.nameEn.toLowerCase().includes(term.toLowerCase()) || l.nameAr.includes(term));
    if(lesson){
        let branch = branchesList.find(b => b.list.some(l => l.id === lesson.id));
        if(branch){ openBranch(branch.id); setTimeout(() => { let l = branch.list.find(l => l.id === lesson.id); if(l) openLesson(l); }, 100); }
    } else { alert("Leçon trouvée dans la base, ouvre la branche correspondante."); }
}
let quizQuestions = [], quizIndex = 0, quizScore = 0;
function startQuickQuiz(){
    quizQuestions = [
        { q: currentLang === "en" ? "What tool measures voltage?" : "ما الأداة التي تقيس الفولتية؟", opts: ["Multimeter", "Oscilloscope", "Soldering iron", "Microscope"], ans: 0 },
        { q: currentLang === "en" ? "Which component stores energy?" : "أي مكون يخزن الطاقة؟", opts: ["Resistor", "Capacitor", "Transistor", "Diode"], ans: 1 },
        { q: currentLang === "en" ? "What does a blown fuse cause?" : "ماذا يسبب الفيوز التالف؟", opts: ["Short circuit", "Open circuit", "Overheating", "No sound"], ans: 1 }
    ];
    quizIndex = 0; quizScore = 0;
    loadQuiz();
    showPage("quizPage");
}
function loadQuiz(){
    if(quizIndex >= quizQuestions.length){
        let pts = quizScore * 10;
        addPoints(pts);
        if(tg?.showAlert) tg.showAlert(`🎉 Quiz terminé ! ${quizScore}/${quizQuestions.length} bonnes réponses +${pts} pts`);
        else alert(`🎉 Quiz terminé ! ${quizScore}/${quizQuestions.length} bonnes réponses +${pts} pts`);
        goHome();
        return;
    }
    let q = quizQuestions[quizIndex];
    document.getElementById("quizQuestion").innerText = q.q;
    let container = document.getElementById("quizOptions");
    container.innerHTML = q.opts.map((opt,i) => `<div class="lesson-item" style="cursor:pointer;" onclick="answerQuiz(${i})">${opt}</div>`).join("");
}
function answerQuiz(idx){
    if(idx === quizQuestions[quizIndex].ans) quizScore++;
    quizIndex++;
    loadQuiz();
}
function nextQuiz(){}
function goHome(){ showPage("homePage"); renderHome(); }
function goBranch(){ if(currentBranch){ renderBranch(); showPage("branchPage"); } else goHome(); }
function openSOS(){ let link="https://t.me/+OVTmcEQLg00zMTQ0"; if(tg?.openTelegramLink) tg.openTelegramLink(link); else window.open(link,"_blank"); }
function showPage(id){ document.querySelectorAll(".page").forEach(p=>p.classList.remove("active")); document.getElementById(id).classList.add("active"); window.scrollTo(0,0); }
applyLang();
</script>
