<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Repair Academy</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050505;
    --panel:#141414;
    --panel2:#1b1b1b;
    --text:#ffffff;
    --soft:#dedede;
    --muted:#9b9b9b;
    --line:#303030;
    --gold:#f2c94c;
    --cyan:#38bdf8;
    --green:#27c46b;
    --red:#b00020;
}

*{box-sizing:border-box;}

body{
    margin:0;
    min-height:100vh;
    color:var(--text);
    font-family:"Manrope","IBM Plex Sans Arabic",Arial,sans-serif;
    background:
        radial-gradient(circle at top left, rgba(56,189,248,.16), transparent 30%),
        radial-gradient(circle at top right, rgba(242,201,76,.16), transparent 30%),
        radial-gradient(circle at bottom, rgba(176,0,32,.12), transparent 35%),
        linear-gradient(180deg,#0d0d0d 0%,#050505 100%);
}

body[dir="rtl"]{
    direction:rtl;
}

.app{
    width:100%;
    max-width:560px;
    margin:0 auto;
    padding:14px;
}

.topbar{
    display:grid;
    grid-template-columns:42px 1fr 42px;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
}

.logo{
    text-align:center;
}

.logo-mark{
    width:34px;
    height:34px;
    margin:0 auto 5px;
    border-radius:12px;
    border:1px solid rgba(56,189,248,.55);
    background:
        radial-gradient(circle, rgba(56,189,248,.25), transparent 60%),
        #101010;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--cyan);
    font-size:17px;
    font-weight:900;
    box-shadow:0 0 18px rgba(56,189,248,.26);
}

.logo h1{
    margin:0;
    font-size:18px;
    font-weight:900;
    letter-spacing:.6px;
    color:#eafaff;
    text-shadow:
        0 0 8px rgba(56,189,248,.48),
        0 0 18px rgba(242,201,76,.16);
}

.logo h1 span{
    color:var(--gold);
}

.status{
    margin-top:3px;
    color:var(--muted);
    font-size:11px;
    font-weight:700;
}

.icon-btn,
.lang-btn{
    width:42px;
    height:42px;
    border:1px solid var(--line);
    border-radius:13px;
    background:rgba(18,18,18,.92);
    color:white;
    font-size:15px;
    font-weight:900;
    cursor:pointer;
}

.lang-btn{
    color:var(--gold);
    font-size:13px;
}

.page{
    display:none;
    animation:fade .18s ease;
}

.page.active{display:block;}

@keyframes fade{
    from{opacity:.45; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
}

.hero,.panel{
    border:1px solid var(--line);
    border-radius:16px;
    background:rgba(20,20,20,.94);
    padding:17px;
    margin-bottom:12px;
    text-align:center;
    box-shadow:0 14px 35px rgba(0,0,0,.24);
}

.hero{
    background:
        linear-gradient(145deg,rgba(56,189,248,.14),rgba(242,201,76,.13)),
        rgba(20,20,20,.96);
}

.title{
    margin:0;
    font-size:22px;
    font-weight:900;
    line-height:1.25;
}

body[dir="rtl"] .title{
    font-family:"IBM Plex Sans Arabic",sans-serif;
    font-size:21px;
}

.text{
    margin:9px 0 0;
    color:var(--soft);
    font-size:14px;
    line-height:1.65;
    font-weight:600;
}

body[dir="rtl"] .text{
    font-family:"IBM Plex Sans Arabic",sans-serif;
    line-height:1.9;
}

.progress-wrap{
    height:10px;
    overflow:hidden;
    border-radius:999px;
    background:#080808;
    border:1px solid var(--line);
    margin-top:14px;
}

.progress{
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(90deg,var(--cyan),var(--gold),var(--green));
    transition:.25s ease;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin:11px 0;
}

.stat{
    border:1px solid var(--line);
    border-radius:13px;
    padding:11px 6px;
    background:rgba(20,20,20,.9);
    text-align:center;
}

.stat strong{
    display:block;
    color:var(--gold);
    font-size:18px;
    font-weight:900;
}

.stat small{
    display:block;
    color:var(--muted);
    font-size:12px;
    line-height:1.45;
    font-weight:700;
}

button{
    min-height:44px;
    padding:11px;
    border-radius:13px;
    border:1px solid var(--line);
    background:#111;
    color:white;
    font-family:"Manrope","IBM Plex Sans Arabic",Arial,sans-serif;
    font-size:14px;
    font-weight:900;
    cursor:pointer;
}

.primary{
    background:linear-gradient(135deg,var(--gold),#ffe08a);
    color:#111;
    border-color:#d7aa25;
}

.danger{
    background:linear-gradient(180deg,#b00020,#780015);
    border-color:#cf1235;
}

.main-action{
    width:100%;
    margin:2px 0 4px;
}

.section-title{
    text-align:center;
    margin:18px 2px 10px;
}

.section-title h3{
    margin:0;
    font-size:17px;
    font-weight:900;
}

.section-title p{
    margin:3px 0 0;
    color:var(--muted);
    font-size:13px;
    font-weight:700;
}

.tree{
    position:relative;
    display:grid;
    gap:13px;
    padding:4px 0;
}

.tree-node{
    position:relative;
    display:grid;
    grid-template-columns:45px 1fr;
    gap:10px;
    align-items:center;
}

body[dir="rtl"] .tree-node{
    grid-template-columns:1fr 45px;
}

.tree-node:not(:last-child)::after{
    content:"";
    position:absolute;
    left:22px;
    top:49px;
    width:2px;
    height:28px;
    background:linear-gradient(180deg,rgba(56,189,248,.7),rgba(242,201,76,.25));
}

body[dir="rtl"] .tree-node:not(:last-child)::after{
    left:auto;
    right:22px;
}

.node-icon{
    width:45px;
    height:45px;
    border-radius:15px;
    border:1px solid rgba(56,189,248,.45);
    background:rgba(56,189,248,.10);
    color:var(--cyan);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:17px;
    font-weight:900;
    box-shadow:0 0 16px rgba(56,189,248,.12);
}

body[dir="rtl"] .node-icon{
    order:2;
}

.node-card{
    min-height:96px;
    border:1px solid var(--line);
    border-radius:15px;
    background:linear-gradient(180deg,#1c1c1c,#101010);
    color:white;
    text-align:center;
    cursor:pointer;
    padding:13px 12px;
    box-shadow:0 10px 24px rgba(0,0,0,.18);
}

.node-card.done{
    border-color:rgba(39,196,107,.8);
}

.node-card.locked{
    opacity:.48;
}

.node-card strong{
    display:block;
    font-size:15.5px;
    font-weight:900;
    line-height:1.28;
}

.node-card small{
    display:block;
    color:var(--muted);
    font-size:12.5px;
    line-height:1.5;
    margin-top:7px;
    font-weight:700;
}

.badge{
    display:inline-block;
    margin-top:9px;
    padding:5px 9px;
    border-radius:999px;
    background:rgba(242,201,76,.12);
    color:var(--gold);
    font-size:11px;
    font-weight:900;
}

.branch-title{
    margin:16px auto 10px;
    width:fit-content;
    max-width:100%;
    padding:8px 12px;
    border-radius:999px;
    border:1px solid rgba(56,189,248,.28);
    background:rgba(56,189,248,.08);
    color:#a9e8ff;
    text-align:center;
    font-size:12px;
    font-weight:900;
}

.list{
    display:grid;
    gap:8px;
}

.lesson{
    border:1px solid var(--line);
    border-radius:14px;
    background:var(--panel2);
    padding:13px;
    text-align:center;
}

.lesson strong{
    display:block;
    font-size:15.5px;
    font-weight:900;
}

.lesson p{
    margin:7px 0 0;
    color:var(--muted);
    font-size:13.5px;
    line-height:1.65;
    font-weight:600;
}

.action-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:9px;
    margin-top:11px;
}

.sos-box{
    border-color:rgba(176,0,32,.55);
    background:rgba(176,0,32,.12);
}

.footer{
    color:#777;
    font-size:11px;
    text-align:center;
    padding:15px 0 5px;
    line-height:1.6;
    font-weight:700;
}

@media(max-width:390px){
    .app{padding:12px;}
    .logo h1{font-size:16px;}
    .tree-node{grid-template-columns:42px 1fr;}
    body[dir="rtl"] .tree-node{grid-template-columns:1fr 42px;}
    .node-icon{width:42px;height:42px;}
    .tree-node:not(:last-child)::after{left:20px;}
    body[dir="rtl"] .tree-node:not(:last-child)::after{right:20px;}
}

@media(max-width:330px){
    .stats{grid-template-columns:1fr;}
    .action-row{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="app">

    <div class="topbar">
        <button class="icon-btn" onclick="goHome()">⌂</button>

        <div class="logo">
            <div class="logo-mark">⌁</div>
            <h1><span>MASTER</span> REPAIR ACADEMY</h1>
            <div class="status" id="telegramStatus"></div>
        </div>

        <button class="lang-btn" id="langButton" onclick="toggleLanguage()">AR</button>
    </div>

    <div id="home" class="page active">
        <div class="hero">
            <h2 class="title" id="heroTitle"></h2>
            <p class="text" id="heroText"></p>
            <div class="progress-wrap"><div class="progress" id="progressBar"></div></div>
            <p class="text" id="progressText">0%</p>
        </div>

        <div class="stats">
            <div class="stat"><strong id="doneCount">0</strong><small id="completedLabel"></small></div>
            <div class="stat"><strong id="totalCount">0</strong><small id="stepsLabel"></small></div>
            <div class="stat"><strong>SOS</strong><small id="supportLabel"></small></div>
        </div>

        <button class="primary main-action" onclick="continueLearning()" id="continueButton"></button>

        <div class="section-title">
            <h3 id="treeTitle"></h3>
            <p id="treeSubtitle"></p>
        </div>

        <div id="treeContainer"></div>

        <div class="section-title">
            <h3 id="supportTitle"></h3>
            <p id="supportSubtitle"></p>
        </div>

        <div class="panel sos-box">
            <h2 class="title" id="sosTitle"></h2>
            <p class="text" id="sosText"></p>
            <br>
            <button class="danger" onclick="openSOS()" id="sosButton"></button>
        </div>
    </div>

    <div id="lessonPage" class="page">
        <div class="panel">
            <h2 class="title" id="lessonTitle"></h2>
            <p class="text" id="lessonDesc"></p>
            <span class="badge" id="lessonBadge"></span>
        </div>

        <div class="section-title">
            <h3 id="learnTitle"></h3>
            <p id="learnSubtitle"></p>
        </div>

        <div class="list" id="lessonPoints"></div>

        <div class="panel">
            <h2 class="title" id="objectiveTitle"></h2>
            <p class="text" id="objectiveText"></p>
        </div>

        <div class="action-row">
            <button onclick="goHome()" id="backButton"></button>
            <button class="primary" onclick="markDone()" id="doneButton"></button>
        </div>
    </div>

    <div class="footer" id="footerText"></div>

</div>

const learningTree = [
    {

            {
                id:"start",

                points:[
                    {title:{en:"Learning order", ar:"ترتيب التعلم"}, text:{en:"Do not start with complex repairs before knowing tools and components.", ar:"لا تبدأ بالإصلاحات المعقدة قبل معرفة الأدوات والمكونات."}},
                    {title:{en:"Safe mindset", ar:"عقلية آمنة"}, text:{en:"The goal is to learn without damaging customer devices.", ar:"الهدف هو التعلم بدون إتلاف أجهزة العملاء."}},
                    {title:{en:"Step by step", ar:"خطوة بخطوة"}, text:{en:"Each node is a small skill that prepares the next one.", ar:"كل نقطة هي مهارة صغيرة تجهزك لما بعدها."}}

        ]

    {

                id:"tools_intro",

function tr(key){
    return ui[currentLang][key];
}

function txt(obj){
    return obj[currentLang];
}

function allNodes(){
    return learningTree.flatMap(group => group.nodes);
}

function doneIds(){
    return JSON.parse(localStorage.getItem("master_repair_done") || "[]");
}

function saveDone(id){
    const ids = doneIds();
    if(!ids.includes(id)) ids.push(id);
    localStorage.setItem("master_repair_done", JSON.stringify(ids));
    localStorage.setItem("master_repair_last", id);
}

function isUnlocked(node){
    const nodes = allNodes();
    const index = nodes.findIndex(item => item.id === node.id);
    if(index === 0) return true;
    return doneIds().includes(nodes[index - 1].id);
}

function applyLanguage(){
    document.documentElement.lang = currentLang;
    document.documentElement.dir = tr("dir");
    document.body.dir = tr("dir");

    document.getElementById("langButton").textContent = tr("langButton");
    document.getElementById("telegramStatus").textContent = tg ? tr("connected") : tr("browser");

    document.getElementById("heroTitle").textContent = tr("heroTitle");
    document.getElementById("heroText").textContent = tr("heroText");
    document.getElementById("completedLabel").textContent = tr("completed");
    document.getElementById("stepsLabel").textContent = tr("steps");
    document.getElementById("supportLabel").textContent = tr("support");
    document.getElementById("continueButton").textContent = tr("continue");
    document.getElementById("treeTitle").textContent = tr("treeTitle");
    document.getElementById("treeSubtitle").textContent = tr("treeSubtitle");
    document.getElementById("supportTitle").textContent = tr("supportTitle");
    document.getElementById("supportSubtitle").textContent = tr("supportSubtitle");
    document.getElementById("sosTitle").textContent = tr("sosTitle");
    document.getElementById("sosText").textContent = tr("sosText");
    document.getElementById("sosButton").textContent = tr("sosButton");
    document.getElementById("learnTitle").textContent = tr("learnTitle");
    document.getElementById("learnSubtitle").textContent = tr("learnSubtitle");
    document.getElementById("objectiveTitle").textContent = tr("objectiveTitle");
    document.getElementById("backButton").textContent = tr("back");
    document.getElementById("doneButton").textContent = tr("done");
    document.getElementById("footerText").textContent = tr("footer");

    renderTree();

    if(currentNode && document.getElementById("lessonPage").classList.contains("active")){
        openNode(currentNode);
    }
}

function toggleLanguage(){
    currentLang = currentLang === "en" ? "ar" : "en";
    localStorage.setItem("master_repair_lang", currentLang);
    applyLanguage();
}

function renderProgress(){
    const total = allNodes().length;
    const done = doneIds().length;
    const pct = total ? Math.round((done / total) * 100) : 0;

    document.getElementById("doneCount").textContent = done;
    document.getElementById("totalCount").textContent = total;
    document.getElementById("progressText").textContent = pct + "% " + tr("completedProgress");
    document.getElementById("progressBar").style.width = pct + "%";
}

function renderTree(){
    renderProgress();

    const container = document.getElementById("treeContainer");
    container.innerHTML = "";

    learningTree.forEach(group => {
        const title = document.createElement("div");
        title.className = "branch-title";
        title.textContent = txt(group.group);
        container.appendChild(title);

        const tree = document.createElement("div");
        tree.className = "tree";

        group.nodes.forEach(node => {
            const done = doneIds().includes(node.id);
            const unlocked = isUnlocked(node);

            const row = document.createElement("div");
            row.className = "tree-node";

            const icon = document.createElement("div");
            icon.className = "node-icon";
            icon.textContent = done ? "✓" : node.icon;

            const btn = document.createElement("button");
            btn.className = "node-card" + (done ? " done" : "") + (!unlocked ? " locked" : "");
            btn.onclick = () => {
                if(unlocked) openNode(node);
                else showLockedMessage();
            };

            btn.innerHTML = `
                <strong>${txt(node.title)}</strong>
                <small>${txt(node.desc)}</small>
                <span class="badge">${done ? tr("doneState") : unlocked ? tr("open") : tr("locked")}</span>
            `;

            if(currentLang === "rtl"){
                row.appendChild(btn);
                row.appendChild(icon);
            }else{
                row.appendChild(icon);
                row.appendChild(btn);
            }

            tree.appendChild(row);
        });

        container.appendChild(tree);
    });
}

function openNode(node){
    currentNode = node;
    localStorage.setItem("master_repair_last", node.id);

    document.getElementById("lessonTitle").textContent = txt(node.title);
    document.getElementById("lessonDesc").textContent = txt(node.desc);
    document.getElementById("objectiveText").textContent = txt(node.objective);
    document.getElementById("lessonBadge").textContent = txt(node.type);

    const list = document.getElementById("lessonPoints");
    list.innerHTML = "";

    node.points.forEach(point => {
        const box = document.createElement("div");
        box.className = "lesson";
        box.innerHTML = `
            <strong>${txt(point.title)}</strong>
            <p>${txt(point.text)}</p>
        `;
        list.appendChild(box);
    });

    sendTelegramData(node.id);
    showPage("lessonPage");
}

function continueLearning(){
    const nodes = allNodes();
    const done = doneIds();

    let next = nodes.find(node => !done.includes(node.id) && isUnlocked(node));
    if(!next){
        const lastId = localStorage.getItem("master_repair_last");
        next = nodes.find(node => node.id === lastId) || nodes[0];
    }

    openNode(next);
}

function markDone(){
    if(currentNode){
        saveDone(currentNode.id);
        renderProgress();
    }

    if(tg && tg.HapticFeedback){
        tg.HapticFeedback.notificationOccurred("success");
    }

    if(tg && tg.showAlert){
        tg.showAlert(tr("completedMessage"));
    }else{
        alert(tr("completedMessage"));
    }
}

function showLockedMessage(){
    if(tg && tg.showAlert){
        tg.showAlert(tr("lockedMessage"));
    }else{
        alert(tr("lockedMessage"));
    }
}

function showPage(id){
    document.querySelectorAll(".page").forEach(page => page.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    window.scrollTo(0,0);
}

function goHome(){
    currentNode = null;
    renderTree();
    showPage("home");
}

function openSOS(){
    const sosLink = "https://t.me/+OVTmcEQLg00zMTQ0";

    if(tg && tg.openTelegramLink){
        tg.openTelegramLink(sosLink);
    }else{
        window.open(sosLink, "_blank");
    }
}

    console.log("Internal navigation:", data);
}
