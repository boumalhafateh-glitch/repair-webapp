<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repair Academy</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

h1{
    color:#00aaff;
}

.page{
    display:none;
    padding:20px;
}

.active{
    display:block;
}

button{
    width:90%;
    padding:15px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#00aaff;
    color:white;
}

.card{
    margin:15px;
    padding:20px;
    background:#1c1c1c;
    border-radius:15px;
}
</style>

</head>

<body>

<h1>🔧 Repair Academy</h1>

<!-- PAGE 1 -->
<div id="home" class="page active">
    <div class="card">
        <h3>📚 Chapitres</h3>
        <button onclick="openPage('chapter1')">Multimètre</button>
        <button onclick="openPage('chapter2')">Composants</button>
    </div>
</div>

<!-- PAGE 2 -->
<div id="chapter1" class="page">
    <h2>📘 Multimètre</h2>
    <p>Apprendre les bases du multimètre</p>
    <button onclick="openPage('home')">⬅ Retour</button>
</div>

<!-- PAGE 3 -->
<div id="chapter2" class="page">
    <h2>📘 Composants</h2>
    <p>Résistance, diode, condensateur</p>
    <button onclick="openPage('home')">⬅ Retour</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function openPage(page){

    document.querySelectorAll(".page").forEach(p => {
        p.classList.remove("active");
    });

    document.getElementById(page).classList.add("active");

    tg.sendData(page);
}
</script>

</body>
</html>
