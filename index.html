<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d0d0d">
    <title>Master Repair Academy</title>

    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --tg-theme-bg: #0d0d0d;
            --tg-theme-text: #ffffff;
            --tg-theme-hint: #9b9b9b;
            --tg-theme-link: #38bdf8;
            --tg-theme-button: #f2c94c;
            --tg-theme-button-text: #111111;
            --tg-theme-secondary-bg: #1c1c1c;
            --tg-theme-header-bg: #0d0d0d;
            --tg-theme-section-bg: #1c1c1c;
            --tg-theme-section-header-text: #9b9b9b;
            --tg-theme-subtitle-text: #9b9b9b;
            --tg-theme-destructive-text: #b00020;
            --line: #303030;
            --gold: #f2c94c;
            --cyan: #38bdf8;
            --green: #27c46b;
            --red: #b00020;
            --soft: #dedede;
            --muted: #9b9b9b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Manrope', 'IBM Plex Sans Arabic', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--tg-theme-bg, #0d0d0d);
            color: var(--tg-theme-text, #ffffff);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
        }

        .app-container {
            max-width: 600px;
            width: 100%;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0 12px;
            gap: 8px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--tg-theme-secondary-bg, #1c1c1c);
            border: 1px solid var(--line);
            color: var(--tg-theme-text, #fff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            backdrop-filter: blur(8px);
        }

        .icon-btn:active {
            transform: scale(0.95);
            background: #2a2a2a;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            flex: 1;
        }

        .logo-mark {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cyan);
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 4px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.25);
        }

        .logo-title {
            font-size: 17px;
            font-weight: 900;
            letter-spacing: 0.5px;
            color: #eafaff;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            margin: 0;
            line-height: 1.2;
        }

        .logo-title span {
            color: var(--gold);
        }

        .status-tag {
            font-size: 10px;
            font-weight: 600;
            color: var(--tg-theme-hint, #9b9b9b);
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 10px;
            border-radius: 20px;
            margin-top: 2px;
        }

        .lang-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(242, 201, 76, 0.1);
            border: 1px solid rgba(242, 201, 76, 0.4);
            color: var(--gold);
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .lang-btn:active {
            background: rgba(242, 201, 76, 0.2);
        }

        /* Pages */
        .page {
            display: none;
            flex-direction: column;
            gap: 12px;
            animation: pageFadeIn 0.25s ease;
            flex: 1;
        }

        .page.active {
            display: flex;
        }

        @keyframes pageFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cards & Panels */
        .card {
            background: var(--tg-theme-secondary-bg, #1c1c1c);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid var(--line);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }

        .hero-card {
            background: linear-gradient(145deg, rgba(56, 189, 248, 0.1), rgba(242, 201, 76, 0.08)), var(--tg-theme-secondary-bg, #1c1c1c);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .card-title {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .card-text {
            font-size: 14px;
            color: var(--tg-theme-hint, #9b9b9b);
            line-height: 1.6;
            font-weight: 500;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin: 4px 0;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 12px 4px;
            text-align: center;
            border: 1px solid var(--line);
        }
        .stat-value {
            font-size: 20px;
            font-weight: 900;
            color: var(--gold);
        }
        .stat-label {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
            font-weight: 600;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--gold), var(--green));
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .main-action-btn {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: none;
            background: var(--tg-theme-button, var(--gold));
            color: var(--tg-theme-button-text, #111);
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(242, 201, 76, 0.3);
            letter-spacing: 0.3px;
        }
        .main-action-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .main-action-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
        }

        .secondary-btn {
            background: var(--tg-theme-secondary-bg, #1c1c1c);
            color: var(--tg-theme-text, #fff);
            border: 1px solid var(--line);
            box-shadow: none;
        }
        .danger-btn {
            background: var(--tg-theme-destructive-text, #b00020);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(176, 0, 32, 0.4);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 8px 0 4px;
        }
        .section-title {
            font-size: 17px;
            font-weight: 800;
        }
        .section-subtitle {
            font-size: 12px;
            color: var(--muted);
        }

        .list-vertical {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .branch-card, .chapter-card {
            background: var(--tg-theme-secondary-bg, #1c1c1c);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }
        .branch-card:active, .chapter-card:active {
            background: #2a2a2a;
            transform: scale(0.99);
        }
        .branch-card.done {
            border-color: rgba(39, 196, 107, 0.6);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-title {
            font-size: 16px;
            font-weight: 800;
        }
        .badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            color: var(--gold);
            white-space: nowrap;
        }
        .badge.done {
            background: rgba(39, 196, 107, 0.2);
            color: var(--green);
        }
        .card-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        .book-control-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .action-btn {
            padding: 12px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            border: 1px solid var(--line);
            background: var(--tg-theme-secondary-bg, #1c1c1c);
            color: var(--tg-theme-text, #fff);
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn:active {
            background: #2a2a2a;
        }
        .action-btn.primary {
            background: var(--gold);
            color: #111;
            border: none;
            font-weight: 800;
        }

        /* Visuals */
        .visual-container {
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 22px;
            padding: 16px;
            border: 1px solid var(--line);
        }
        /* Meter visual ... keeping similar but professional */
        .meter-screen {
            font-size: 28px;
            font-weight: 900;
            background: #9fd7b2;
            color: #071107;
            padding: 10px;
            border-radius: 14px;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 1px;
            border: 2px solid #0b0b0b;
        }
        .dial {
            width: 140px;
            height: 140px;
            margin: 0 auto 12px;
            border-radius: 50%;
            background: #0d0d0d;
            border: 8px solid #2b2b2b;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dial-center-text {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gold);
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 12px;
        }
        .mode-marker {
            position: absolute;
            font-size: 10px;
            font-weight: 700;
            color: #aaa;
            transition: color 0.2s;
        }
        .mode-marker.active {
            color: var(--gold);
            text-shadow: 0 0 8px var(--gold);
        }
        .ports-row {
            display: flex;
            gap: 8px;
            margin: 10px 0;
        }
        .port-tag {
            flex: 1;
            background: #0a0a0a;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            font-weight: 800;
            font-size: 12px;
            border: 1px solid #333;
        }
        .port-tag.red {
            color: #ff6b6b;
        }
        .port-tag.black {
            color: #cfcfcf;
        }
        .port-tag.gold {
            color: var(--gold);
        }
        .probes {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 8px;
        }
        .probe {
            width: 10px;
            height: 60px;
            border-radius: 10px;
            position: relative;
        }
        .probe:before {
            content: "";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 14px solid currentColor;
        }
        .component-visual {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .comp-symbol {
            font-size: 36px;
            font-weight: 900;
            background: #101010;
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(242, 201, 76, 0.4);
            color: var(--gold);
        }
        .schematic-tag {
            font-size: 14px;
            background: rgba(255,255,255,0.05);
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid var(--line);
        }
        .test-io {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .io-box {
            background: #101010;
            border-radius: 12px;
            padding: 10px 16px;
            font-weight: 700;
            border: 1px solid #333;
        }
        .meter-mini {
            width: 80px;
            height: 50px;
            background: #9fd7b2;
            border-radius: 12px;
            color: #071107;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border: 2px solid #0b0b0b;
        }

        .point-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 14px;
            border: 1px solid var(--line);
        }
        .point-title {
            font-weight: 800;
            margin-bottom: 4px;
        }
        .point-text {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            color: #555;
            font-size: 11px;
            padding: 20px 0 10px;
            margin-top: auto;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 999;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Top Bar -->
    <div class="top-bar">
        <button class="icon-btn" id="backButton" style="visibility: hidden;">←</button>
        <div class="logo-area">
            <div class="logo-mark">⌁</div>
            <h1 class="logo-title"><span>MASTER</span> REPAIR ACADEMY</h1>
            <div class="status-tag" id="connectionStatus">Loading...</div>
        </div>
        <button class="lang-btn" id="langToggle">AR</button>
    </div>

    <!-- Home Page -->
    <div id="homePage" class="page active">
        <div class="card hero-card">
            <div class="card-title" id="heroTitle"></div>
            <div class="card-text" id="heroText"></div>
            <div class="progress-container">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="card-text" id="progressLabel"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value" id="doneCount">0</div>
                <div class="stat-label" id="completedLabel"></div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label" id="stepsLabel"></div>
            </div>
            <div class="stat-box">
                <div class="stat-value">SOS</div>
                <div class="stat-label" id="supportLabel"></div>
            </div>
        </div>

        <button class="main-action-btn" id="continueBtn"></button>

        <div class="section-header">
            <span class="section-title" id="branchesTitle"></span>
            <span class="section-subtitle" id="branchesSubtitle"></span>
        </div>
        <div class="list-vertical" id="branchList"></div>

        <div class="card" style="border-color: rgba(176,0,32,0.5); background: rgba(176,0,32,0.08);">
            <div class="card-title" id="sosTitle"></div>
            <div class="card-text" id="sosText"></div>
            <button class="main-action-btn danger-btn" id="sosBtn" style="margin-top: 12px;"></button>
        </div>
    </div>

    <!-- Branch Page -->
    <div id="branchPage" class="page">
        <div class="card">
            <div class="card-title" id="branchTitle"></div>
            <div class="card-text" id="branchDesc"></div>
            <span class="badge" id="branchProgressBadge"></span>
        </div>
        <div class="section-header">
            <span class="section-title" id="chaptersTitle"></span>
            <span class="section-subtitle" id="chaptersSubtitle"></span>
        </div>
        <div class="list-vertical" id="chapterList"></div>
        <button class="main-action-btn secondary-btn" id="branchBackBtn"></button>
    </div>

    <!-- Book Page -->
    <div id="bookPage" class="page">
        <div class="card">
            <div class="card-title" id="bookTitle"></div>
            <div class="card-text" id="bookDesc"></div>
            <div class="badge" id="bookCounter"></div>
        </div>

        <div class="visual-container" id="bookVisual"></div>

        <div class="card">
            <div class="card-title" id="bookPageTitle"></div>
            <div class="card-text" id="bookPageText"></div>
        </div>

        <div class="list-vertical" id="bookPoints"></div>

        <div class="book-control-row">
            <button class="action-btn" id="prevBtn"></button>
            <button class="action-btn" id="nextBtn"></button>
        </div>

        <div class="book-control-row" style="margin-top: 4px;">
            <button class="action-btn" id="bookBackBtn"></button>
            <button class="action-btn primary" id="markDoneBtn"></button>
        </div>
    </div>

    <div class="footer" id="footerText"></div>
</div>

<script>
    (function() {
        // ---------- Telegram Integration ----------
        const tg = window.Telegram?.WebApp;
        const isTelegram = !!tg;
        let cloudStorageAvailable = false;

        if (tg) {
            tg.ready();
            tg.expand();
            tg.enableClosingConfirmation();
            tg.isClosingConfirmationEnabled = true;
            // Apply Telegram theme colors
            document.documentElement.style.setProperty('--tg-theme-bg', tg.themeParams.bg_color || '#0d0d0d');
            document.documentElement.style.setProperty('--tg-theme-text', tg.themeParams.text_color || '#ffffff');
            document.documentElement.style.setProperty('--tg-theme-hint', tg.themeParams.hint_color || '#9b9b9b');
            document.documentElement.style.setProperty('--tg-theme-link', tg.themeParams.link_color || '#38bdf8');
            document.documentElement.style.setProperty('--tg-theme-button', tg.themeParams.button_color || '#f2c94c');
            document.documentElement.style.setProperty('--tg-theme-button-text', tg.themeParams.button_text_color || '#111111');
            document.documentElement.style.setProperty('--tg-theme-secondary-bg', tg.themeParams.secondary_bg_color || '#1c1c1c');
            document.documentElement.style.setProperty('--tg-theme-section-bg', tg.themeParams.section_bg_color || '#1c1c1c');
            document.documentElement.style.setProperty('--tg-theme-destructive-text', tg.themeParams.destructive_text_color || '#b00020');

            // MainButton
            tg.MainButton.setParams({
                text: '',
                color: tg.themeParams.button_color || '#f2c94c',
                text_color: tg.themeParams.button_text_color || '#111111'
            });
            tg.MainButton.onClick(() => {
                if (currentMainAction) currentMainAction();
            });

            // BackButton
            tg.BackButton.onClick(() => {
                navigateBack();
            });
            updateBackButton();
        }

        // ---------- Data ----------
        const langData = {
            en: {
                dir: 'ltr',
                langBtn: 'AR',
                connected: 'Connected to Telegram',
                browser: 'Browser Mode',
                heroTitle: 'Motherboard Repair Learning Path',
                heroText: 'Choose a branch, then open its chapters.',
                completed: 'Completed',
                steps: 'Steps',
                support: 'Support',
                continue: 'Continue Learning',
                branchesTitle: 'Learning Branches',
                branchesSubtitle: 'Choose a training area',
                chaptersTitle: 'Chapters',
                chaptersSubtitle: 'Choose a lesson',
                sosTitle: 'SOS Repair',
                sosText: 'Open the Telegram group to ask for help.',
                sosBtn: 'Open SOS',
                back: 'Back',
                done: 'Mark Done',
                prev: 'Previous',
                next: 'Next',
                footer: 'Master Repair Academy • Professional',
                completedProgress: 'completed',
                open: 'Open',
                doneState: 'Done',
                toastDone: 'Lesson completed!',
                toastError: 'Error saving progress'
            },
            ar: {
                dir: 'rtl',
                langBtn: 'EN',
                connected: 'متصل بتيليجرام',
                browser: 'وضع المتصفح',
                heroTitle: 'مسار تعلم إصلاح اللوحات',
                heroText: 'اختر فرعاً ثم افتح دروسه.',
                completed: 'مكتمل',
                steps: 'خطوات',
                support: 'الدعم',
                continue: 'متابعة التعلم',
                branchesTitle: 'فروع التعلم',
                branchesSubtitle: 'اختر مجال التدريب',
                chaptersTitle: 'الدروس',
                chaptersSubtitle: 'اختر درساً',
                sosTitle: 'دعم الإصلاح',
                sosText: 'افتح مجموعة تيليجرام لطلب المساعدة.',
                sosBtn: 'فتح الدعم',
                back: 'رجوع',
                done: 'تم',
                prev: 'السابق',
                next: 'التالي',
                footer: 'Master Repair Academy • احترافي',
                completedProgress: 'مكتمل',
                open: 'فتح',
                doneState: 'تم',
                toastDone: 'تم إنهاء الدرس!',
                toastError: 'خطأ في حفظ التقدم'
            }
        };

        function t(key) { return langData[currentLang][key] || key; }
        function txt(obj) { return obj[currentLang]; }

                { id: "coil", icon: "L", title: { en: "Coil", ar: "ملف" }, desc: { en: "Role, symbol and test method.", ar: "الدور والرمز وطريقة الفحص." }, book: componentBooks.coil },
                { id: "fuse", icon: "F", title: { en: "Fuse", ar: "فيوز" }, desc: { en: "Role, symbol and test method.", ar: "الدور والرمز وطريقة الفحص." }, book: componentBooks.fuse },
                { id: "connector", icon: "CN", title: { en: "Connector", ar: "كونكتور" }, desc: { en: "Role, symbol and test method.", ar: "الدور والرمز وطريقة الفحص." }, book: componentBooks.connector },
                { id: "ic", icon: "IC", title: { en: "IC", ar: "IC" }, desc: { en: "General IC logic and safe diagnosis.", ar: "منطق الشريحة والتشخيص الآمن." }, book: componentBooks.ic }
            ]},
            { id: "safety", title: { en: "Safety & Opening", ar: "السلامة وفتح الهاتف" }, desc: { en: "Work safely before diagnosis.", ar: "اعمل بأمان قبل التشخيص." }, nodes: [
                { id: "safety", icon: "SAFE", title: { en: "Safety", ar: "السلامة" }, desc: { en: "Battery, ESD, heat and safe work.", ar: "البطارية، ESD، الحرارة والعمل الآمن." }, book: systemBooks.safety },
                { id: "opening", icon: "OPEN", title: { en: "Phone Opening", ar: "فتح الهاتف" }, desc: { en: "Open phones without damage.", ar: "فتح الهاتف بدون أضرار." }, book: systemBooks.opening }
            ]},
            { id: "systems", title: { en: "Boot & Systems", ar: "الإقلاع والأنظمة" }, desc: { en: "Learn how the board wakes up and runs systems.", ar: "تعلم كيف تستيقظ اللوحة وتشغل الأنظمة." }, nodes: [
                { id: "circuits", icon: "LINE", title: { en: "Circuit Basics", ar: "أساسيات الدوائر" }, desc: { en: "Lines, ground and power flow.", ar: "الخطوط والأرضي وتدفق الطاقة." }, book: systemBooks.circuits },
                { id: "pmic", icon: "PMIC", title: { en: "PMIC", ar: "PMIC" }, desc: { en: "Main power management IC.", ar: "دارة إدارة الطاقة الرئيسية." }, book: systemBooks.pmic },
                { id: "cpu", icon: "CPU", title: { en: "CPU / SoC", ar: "المعالج" }, desc: { en: "Main brain of the phone.", ar: "العقل الرئيسي للهاتف." }, book: systemBooks.cpu },
                { id: "storage", icon: "NAND", title: { en: "Storage", ar: "التخزين" }, desc: { en: "Bootloader and data storage.", ar: "البوتلودر وتخزين البيانات." }, book: systemBooks.storage },
                { id: "display", icon: "LCD", title: { en: "Display System", ar: "نظام الشاشة" }, desc: { en: "Image signal and display power.", ar: "إشارة الصورة وطاقة الشاشة." }, book: systemBooks.display },
                { id: "backlight", icon: "BL", title: { en: "Backlight", ar: "الإضاءة" }, desc: { en: "Screen light circuit.", ar: "دائرة إضاءة الشاشة." }, book: systemBooks.backlight },
                { id: "charge", icon: "CHG", title: { en: "Charging", ar: "الشحن" }, desc: { en: "USB to battery charging path.", ar: "مسار الشحن USB إلى البطارية." }, book: systemBooks.charge },
                { id: "usb", icon: "USB", title: { en: "USB / Data", ar: "USB / البيانات" }, desc: { en: "USB data and Type-C.", ar: "بيانات USB و Type-C." }, book: systemBooks.usb },
                { id: "audio", icon: "AUD", title: { en: "Audio", ar: "الصوت" }, desc: { en: "Codec, amplifier, mic, speaker.", ar: "الكودك، الأمبليفاير." }, book: systemBooks.audio },
                { id: "camera", icon: "CAM", title: { en: "Camera", ar: "الكاميرا" }, desc: { en: "Camera power and MIPI.", ar: "طاقة الكاميرا و MIPI." }, book: systemBooks.camera },
                { id: "rf", icon: "RF", title: { en: "RF / Network", ar: "الشبكة" }, desc: { en: "Baseband, RF, PA, antennas.", ar: "البيسباند، RF، PA." }, book: systemBooks.rf }
            ]}
        ];

        const allNodes = branches.flatMap(b => b.nodes);

        // ---------- Persistence (CloudStorage + localStorage fallback) ----------
        async function loadProgress() {
            if (isTelegram && tg.CloudStorage) {
                try {
                    const items = await new Promise((resolve, reject) => {
                        tg.CloudStorage.getItems(['doneLessons', 'language', 'lastNode'], (error, values) => {
                            if (error) reject(error);
                            else resolve(values);
                        });
                    });
                    if (items) {
                        if (items.doneLessons) doneLessons = JSON.parse(items.doneLessons);
                        if (items.language) currentLang = items.language;
                        if (items.lastNode && !doneLessons.includes(items.lastNode)) {
                            // optional auto-open last, but we'll just use it for continue
                            localStorage.setItem('master_last_node', items.lastNode);
                        }
                        cloudStorageAvailable = true;
                    }
                } catch (e) {
                    console.warn('CloudStorage load fallback to localStorage', e);
                    loadFromLocalStorage();
                }
            } else {
                loadFromLocalStorage();
            }
            if (!doneLessons.length && localStorage.getItem('master_repair_done')) {
                doneLessons = JSON.parse(localStorage.getItem('master_repair_done'));
            }
            if (!currentLang || currentLang !== 'en' && currentLang !== 'ar') currentLang = localStorage.getItem('master_repair_lang') || 'en';
        }

        function loadFromLocalStorage() {
            doneLessons = JSON.parse(localStorage.getItem('master_repair_done') || '[]');
            currentLang = localStorage.getItem('master_repair_lang') || 'en';
        }

        async function saveProgress() {
            localStorage.setItem('master_repair_done', JSON.stringify(doneLessons));
            localStorage.setItem('master_repair_lang', currentLang);
            if (isTelegram && tg.CloudStorage && cloudStorageAvailable) {
                try {
                    await new Promise((resolve, reject) => {
                        tg.CloudStorage.setItems({
                            doneLessons: JSON.stringify(doneLessons),
                            language: currentLang,
                            lastNode: currentNodeId || ''
                        }, (error, success) => {
                            if (error) reject(error);
                            else resolve(success);
                        });
                    });
                } catch (e) { console.warn('CloudStorage save error', e); }
            }
        }

        function markLessonDone(id) {
            if (!doneLessons.includes(id)) {
                doneLessons.push(id);
                saveProgress();
                showToast(t('toastDone'));
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }
        }

        // ---------- Navigation ----------
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function navigateTo(pageId, push = true) {
            if (push && pageId !== 'homePage') {
                navigationStack.push(activePageId());
            }
            showPage(pageId);
            updateBackButton();
        }

        function activePageId() {
            const active = document.querySelector('.page.active');
            return active ? active.id : 'homePage';
        }

        function navigateBack() {
            if (navigationStack.length > 0) {
                const prev = navigationStack.pop();
                showPage(prev);
            } else {
                goHome();
            }
            updateBackButton();
        }

        function goHome() {
            navigationStack = [];
            currentBranchId = null;
            currentNodeId = null;
            renderHome();
            showPage('homePage');
            updateBackButton();
        }

        function openBranch(id) {
            currentBranchId = id;
            renderBranchPage();
            navigateTo('branchPage');
        }

        function openNode(node) {
            currentNodeId = node.id;
            currentBookPage = 0;
            if (!currentBranchId) {
                const branch = branches.find(b => b.nodes.some(n => n.id === node.id));
                if (branch) currentBranchId = branch.id;
            }
            renderBookPage();
            navigateTo('bookPage');
        }

        function continueLearning() {
            const firstUndone = allNodes.find(n => !doneLessons.includes(n.id));
            if (firstUndone) {
                openNode(firstUndone);
            } else {
                openNode(allNodes[0]);
            }
        }

        function updateBackButton() {
            const backBtn = document.getElementById('backButton');
            if (!isTelegram) {
                backBtn.style.visibility = navigationStack.length > 0 || activePageId() !== 'homePage' ? 'visible' : 'hidden';
                backBtn.onclick = navigateBack;
            } else {
                // In Telegram, rely on native BackButton
                if (activePageId() !== 'homePage') {
                    tg.BackButton.show();
                } else {
                    tg.BackButton.hide();
                }
                backBtn.style.display = 'none'; // hide our custom button
            }
        }

        // ---------- Render Functions ----------
        function renderHome() {
            const total = allNodes.length;
            const done = doneLessons.length;
            const pct = total ? Math.round((done / total) * 100) : 0;

            document.getElementById('doneCount').textContent = done;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('progressLabel').textContent = `${pct}% ${t('completedProgress')}`;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('heroTitle').textContent = t('heroTitle');
            document.getElementById('heroText').textContent = t('heroText');
            document.getElementById('continueBtn').textContent = t('continue');
            document.getElementById('branchesTitle').textContent = t('branchesTitle');
            document.getElementById('branchesSubtitle').textContent = t('branchesSubtitle');
            document.getElementById('sosTitle').textContent = t('sosTitle');
            document.getElementById('sosText').textContent = t('sosText');
            document.getElementById('sosBtn').textContent = t('sosBtn');
            document.getElementById('completedLabel').textContent = t('completed');
            document.getElementById('stepsLabel').textContent = t('steps');
            document.getElementById('supportLabel').textContent = t('support');

            const branchList = document.getElementById('branchList');
            branchList.innerHTML = '';
            branches.forEach(branch => {
                const doneCount = branch.nodes.filter(n => doneLessons.includes(n.id)).length;
                const totalBranch = branch.nodes.length;
                const isDone = doneCount === totalBranch;
                const card = document.createElement('div');
                card.className = `branch-card ${isDone ? 'done' : ''}`;
                card.onclick = () => openBranch(branch.id);
                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-title">${txt(branch.title)}</span>
                        <span class="badge ${isDone ? 'done' : ''}">${doneCount}/${totalBranch}</span>
                    </div>
                    <div class="card-desc">${txt(branch.desc)}</div>
                `;
                branchList.appendChild(card);
            });

            // Connect MainButton for continue
            if (isTelegram) {
                tg.MainButton.setText(t('continue'));
                tg.MainButton.show();
                currentMainAction = continueLearning;
            }
        }

        function renderBranchPage() {
            const branch = branches.find(b => b.id === currentBranchId);
            if (!branch) return;
            const doneCount = branch.nodes.filter(n => doneLessons.includes(n.id)).length;
            document.getElementById('branchTitle').textContent = txt(branch.title);
            document.getElementById('branchDesc').textContent = txt(branch.desc);
            document.getElementById('branchProgressBadge').textContent = `${doneCount}/${branch.nodes.length}`;
            document.getElementById('chaptersTitle').textContent = t('chaptersTitle');
            document.getElementById('chaptersSubtitle').textContent = t('chaptersSubtitle');
            document.getElementById('branchBackBtn').textContent = t('back');

            const chapterList = document.getElementById('chapterList');
            chapterList.innerHTML = '';
            branch.nodes.forEach(node => {
                const isDone = doneLessons.includes(node.id);
                const card = document.createElement('div');
                card.className = `chapter-card ${isDone ? 'done' : ''}`;
                card.onclick = () => openNode(node);
                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-title">${txt(node.title)}</span>
                        <span class="badge ${isDone ? 'done' : ''}">${isDone ? t('doneState') : t('open')}</span>
                    </div>
                    <div class="card-desc">${txt(node.desc)}</div>
                `;
                chapterList.appendChild(card);
            });

            if (isTelegram) {
                tg.MainButton.hide();
                currentMainAction = null;
            }
        }

        function renderBookPage() {
            const node = allNodes.find(n => n.id === currentNodeId);
            if (!node) return;
            const book = node.book;
            if (!book || book.length === 0) return;
            const page = book[currentBookPage];

            document.getElementById('bookTitle').textContent = txt(node.title);
            document.getElementById('bookDesc').textContent = txt(node.desc);
            document.getElementById('bookCounter').textContent = `${currentBookPage + 1} / ${book.length}`;
            document.getElementById('bookPageTitle').textContent = txt(page.title);
            document.getElementById('bookPageText').textContent = txt(page.text);
            document.getElementById('prevBtn').textContent = t('prev');
            document.getElementById('nextBtn').textContent = t('next');
            document.getElementById('bookBackBtn').textContent = t('back');
            document.getElementById('markDoneBtn').textContent = t('done');

            document.getElementById('prevBtn').disabled = currentBookPage === 0;
            document.getElementById('nextBtn').disabled = currentBookPage === book.length - 1;

            const visualDiv = document.getElementById('bookVisual');
            visualDiv.innerHTML = generateVisual(page);

            const pointsList = document.getElementById('bookPoints');
            pointsList.innerHTML = '';
            page.points.forEach(p => {
                const item = document.createElement('div');
                item.className = 'point-item';
                item.innerHTML = `<div class="point-title">${txt(p.title)}</div><div class="point-text">${txt(p.text)}</div>`;
                pointsList.appendChild(item);
            });

            if (isTelegram) {
                tg.MainButton.setText(t('done'));
                tg.MainButton.show();
                currentMainAction = () => markLessonDone(node.id);
            }
        }

        function generateVisual(page) {
            if (page.kind === 'meter') return generateMeterVisual(page);
            if (page.kind === 'component') return generateComponentVisual(page);
            return '';
        }

        function generateMeterVisual(page) {
            const mode = page.mode;
            const modes = [
                { class: 'm-off', label: 'OFF', pos: 'top:6px;left:52px;' },
                { class: 'm-vdc', label: 'V⎓', pos: 'top:20px;right:13px;' },
                { class: 'm-vac', label: 'V~', pos: 'right:4px;top:55px;' },
                { class: 'm-ohm', label: 'Ω', pos: 'right:18px;bottom:17px;' },
                { class: 'm-cont', label: ')))', pos: 'left:52px;bottom:5px;' },
                { class: 'm-diode', label: '▷|', pos: 'left:15px;bottom:18px;' },
                { class: 'm-a', label: 'A', pos: 'left:4px;top:55px;' },
                { class: 'm-ma', label: 'mA', pos: 'left:14px;top:20px;' }
            ];
            return `
                <div class="meter-screen">${page.display}</div>
                <div class="dial">
                    ${modes.map(m => `<span class="mode-marker ${m.class} ${m.class.slice(2) === mode.toLowerCase() ? 'active' : ''}" style="${m.pos}">${m.label}</span>`).join('')}
                    <div class="dial-center-text">${page.display.split(' ')[0] || mode}</div>
                </div>
                <div class="ports-row">
                    <div class="port-tag black">COM</div>
                    <div class="port-tag red">VΩ</div>
                    <div class="port-tag gold">10A</div>
                </div>
                <div class="probes">
                    <div class="probe" style="background:#cbd5e1;color:#cbd5e1;"></div>
                    <div class="probe" style="background:#e11d48;color:#e11d48;"></div>
                </div>
            `;
        }

        function generateComponentVisual(page) {
            return `
                <div class="component-visual">
                    <div style="font-size:12px;text-transform:uppercase;font-weight:800;color:var(--cyan);margin-bottom:4px;">${page.mode}</div>
                    <div class="comp-symbol">${page.display}</div>
                    <div class="schematic-tag">${page.symbol}</div>
                    <div class="test-io">
                        <div class="io-box">IN</div>
                        <div class="meter-mini">${page.display}</div>
                        <div class="io-box">OUT</div>
                    </div>
                </div>
            `;
        }

        // ---------- UI Helpers ----------
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // ---------- Event Listeners ----------
        document.getElementById('continueBtn').addEventListener('click', continueLearning);
        document.getElementById('sosBtn').addEventListener('click', () => {
            const link = "https://t.me/+OVTmcEQLg00zMTQ0";
            if (isTelegram) tg.openTelegramLink(link);
            else window.open(link, '_blank');
        });
        document.getElementById('branchBackBtn').addEventListener('click', goHome);
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentBookPage > 0) {
                currentBookPage--;
                renderBookPage();
            }
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            const node = allNodes.find(n => n.id === currentNodeId);
            if (node && currentBookPage < node.book.length - 1) {
                currentBookPage++;
                renderBookPage();
            }
        });
        document.getElementById('bookBackBtn').addEventListener('click', () => {
            if (currentBranchId) {
                renderBranchPage();
                navigateTo('branchPage', false);
            } else goHome();
        });
        document.getElementById('markDoneBtn').addEventListener('click', () => {
            if (currentNodeId) {
                markLessonDone(currentNodeId);
                renderHome(); // reflect progress
                if (currentBranchId) renderBranchPage();
            }
        });

        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = t('dir');
            saveProgress();
            applyLanguage();
        });

        // Back button for non-Telegram
        if (!isTelegram) {
            document.getElementById('backButton').addEventListener('click', navigateBack);
        }

        function applyLanguage() {
            document.getElementById('langToggle').textContent = t('langBtn');
            document.getElementById('connectionStatus').textContent = isTelegram ? t('connected') : t('browser');
            document.getElementById('footerText').textContent = t('footer');
            if (activePageId() === 'homePage') renderHome();
            else if (activePageId() === 'branchPage') renderBranchPage();
            else if (activePageId() === 'bookPage') renderBookPage();
        }

        // ---------- Initialization ----------
        async function init() {
            await loadProgress();
            document.documentElement.lang = currentLang;
            document.documentElement.dir = t('dir');
            applyLanguage();
            updateBackButton();
            // if there's a last node saved and user hasn't completed everything, maybe pre-load continue?
        }

        init();
    })();
</script>
</body>
</html>
