<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repair Academy</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;text-align:center;}
h1{font-family:'Orbitron',sans-serif;color:#fff;margin-top:15px;font-size:20px;}
.page{display:none;padding:15px;}
.active{display:block;}
.card{margin:10px;padding:15px;background:#1c1c1c;border-radius:15px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
button{width:100%;padding:14px;border:none;border-radius:10px;background:#1a1a1a;color:white;border:1px solid #333;}
.en{display:block;font-size:13px;}
.ar{display:block;font-size:12px;color:#bbb;direction:rtl;}
.sos{background:#8b0000;border:1px solid #aa0000;margin-top:15px;font-weight:bold;}
</style>
</head>

<body>

<h1>⚡ Repair Academy ⚡</h1>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h3><span class="en">Levels</span><span class="ar">المستويات</span></h3>

<div class="grid">
<button onclick="openPage('c1')"><span class="en">Level 1</span><span class="ar">المستوى 1</span></button>
<button onclick="openPage('c2')"><span class="en">Level 2</span><span class="ar">المستوى 2</span></button>
<button onclick="openPage('c3')"><span class="en">Level 3</span><span class="ar">المستوى 3</span></button>
<button onclick="openPage('c4')"><span class="en">Level 4</span><span class="ar">المستوى 4</span></button>
<button onclick="openPage('c5')"><span class="en">Level 5</span><span class="ar">المستوى 5</span></button>
<button onclick="openPage('c6')"><span class="en">Level 6</span><span class="ar">المستوى 6</span></button>
<button onclick="openPage('c7')"><span class="en">Level 7</span><span class="ar">المستوى 7</span></button>
<button onclick="openPage('c8')"><span class="en">Level 8</span><span class="ar">المستوى 8</span></button>
<button onclick="openPage('c9')"><span class="en">Level 9</span><span class="ar">المستوى 9</span></button>
<button onclick="openPage('c10')"><span class="en">Level 10</span><span class="ar">المستوى 10</span></button>
</div>

<button class="sos" onclick="openSOS()">
<span class="en">HELP / SOS</span>
<span class="ar">مساعدة</span>
</button>

</div>
</div>

<!-- ================= LEVEL 1 MENU ================= -->
<div id="c1" class="page">
<div class="card">
<h2><span class="en">Level 1</span><span class="ar">المستوى 1</span></h2>

<div class="grid">
<button onclick="openPage('tool1')"><span class="en">Tools</span><span class="ar">أدوات العمل</span></button>
<button onclick="openPage('multimeter')"><span class="en">Multimeter</span><span class="ar">الملتيميتر</span></button>
<button onclick="openPage('components')"><span class="en">Components</span><span class="ar">المكونات</span></button>
<button onclick="openPage('safety')"><span class="en">Safety</span><span class="ar">السلامة</span></button>
</div>

<button onclick="openPage('home')"><span class="en">Back</span><span class="ar">رجوع</span></button>
</div>
</div>

<!-- COURSES LEVEL 1 -->
<div id="tool1" class="page"><div class="card"><h2><span class="en">Tools</span><span class="ar">أدوات العمل</span></h2><button onclick="openPage('c1')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>
<div id="multimeter" class="page"><div class="card"><h2><span class="en">Multimeter</span><span class="ar">الملتيميتر</span></h2><button onclick="openPage('c1')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>
<div id="components" class="page"><div class="card"><h2><span class="en">Components</span><span class="ar">المكونات</span></h2><button onclick="openPage('c1')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>
<div id="safety" class="page"><div class="card"><h2><span class="en">Safety</span><span class="ar">السلامة</span></h2><button onclick="openPage('c1')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>

<!-- LEVELS 2 → 10 (INTOUCHÉS) -->
<div id="c2" class="page"><div class="card"><h2><span class="en">Level 2</span><span class="ar">المستوى 2</span></h2><button onclick="openPage('home')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>
<div id="c3" class="page"><div class="card"><h2><span class="en">Level 3</span><span class="ar">المستوى 3</span></h2><button onclick="openPage('home')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>
<div id="c4" class="page"><div class="card"><h2><span class="en">Level 4</span><span class="ar">المستوى 4</span></h2><button onclick="openPage('home')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>
<div id="c5" class="page"><div class="card"><h2><span class="en">Level 5</span><span class="ar">المستوى 5</span></h2><button onclick="openPage('home')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>
<div id="c6" class="page"><div class="card"><h2><span class="en">Level 6</span><span class="ar">المستوى 6</span></h2><button onclick="openPage('home')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>
<div id="c7" class="page"><div class="card"><h2><span class="en">Level 7</span><span class="ar">المستوى 7</span></h2><button onclick="openPage('home')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>
<div id="c8" class="page"><div class="card"><h2><span class="en">Level 8</span><span class="ar">المستوى 8</span></h2><button onclick="openPage('home')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>
<div id="c9" class="page"><div class="card"><h2><span class="en">Level 9</span><span class="ar">المستوى 9</span></h2><button onclick="openPage('home')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>
<div id="c10" class="page"><div class="card"><h2><span class="en">Level 10</span><span class="ar">المستوى 10</span></h2><button onclick="openPage('home')"><span class="en">Back</span><span class="ar">رجوع</span></button></div></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function openPage(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
tg.sendData(page);
}

function openSOS(){
window.open("https://t.me/c/3919937885/2","_blank");
}
</script>

</body>
</html>
