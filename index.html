<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Repair Academy</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#080808;
    --surface:#111;
    --line:#303030;
    --gold:#f2c94c;
    --cyan:#38bdf8;
    --green:#27c46b;
    --muted:#9b9b9b;
    --soft:#dedede;
}

*{box-sizing:border-box;}

body{
    margin:0;
    min-height:100vh;
    color:#fff;
    font-family:"Manrope","IBM Plex Sans Arabic",Arial;
    background: linear-gradient(180deg,#0d0d0d,#050505);
}

.app{max-width:560px;margin:auto;padding:16px;}

.topbar{
    display:grid;
    grid-template-columns:42px 1fr 42px;
    align-items:center;
    gap:10px;
}

.icon-btn,.lang-btn{
    width:42px;height:42px;
    border:1px solid var(--line);
    border-radius:12px;
    background:#111;
    color:#fff;
    cursor:pointer;
    font-weight:900;
}

.logo{text-align:center;}

.page{display:none;}
.page.active{display:block;}

.hero,.panel,.lesson-card{
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px;
    background:#121212;
    margin-bottom:12px;
}

.title{font-size:20px;font-weight:900;}

button{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid var(--line);
    background:#111;
    color:#fff;
    font-weight:900;
    cursor:pointer;
}

.primary{background:var(--gold);color:#000;}

.progress-wrap{
    height:10px;
    background:#000;
    border-radius:999px;
    margin-top:10px;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--cyan),var(--gold));
}
</style>
</head>

<body>

<div class="app">

<!-- TOP -->
<div class="topbar">
    <button class="icon-btn" onclick="goHome()">⌂</button>
    <div class="logo">
        <h2>MASTER REPAIR</h2>
    </div>
    <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">AR</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

    <div class="hero">
        <h2 id="heroTitle"></h2>
        <p id="heroText"></p>

        <div class="progress-wrap">
            <div class="progress" id="progressBar"></div>
        </div>
    </div>

    <button class="primary" onclick="continueLearning()" id="continueBtn"></button>

    <div id="branchList"></div>

</div>

<!-- LESSON -->
<div id="lesson" class="page">

    <div class="panel">
        <h2 id="lessonTitle"></h2>
        <p id="lessonDesc"></p>
    </div>

    <div class="lesson-card" id="lessonPoints"></div>

    <button class="primary" onclick="toggleDone()" id="doneBtn"></button>
    <button onclick="goHome()">Back</button>

</div>

</div>

<script>
/* ================= DATA ================= */

const branches = [
{
    id:"tools",
    title:{en:"Tools",ar:"الأدوات"},
    desc:{en:"Basic tools",ar:"الأدوات الأساسية"},
    lessons:[
        {
            id:"multimeter",
            title:{en:"Multimeter",ar:"الملتيميتر"},
            desc:{en:"Measure voltage safely",ar:"قياس الفولت"},
            points:[
                {en:"Use correct mode",ar:"استعمل الوضع الصحيح"},
                {en:"Check continuity",ar:"فحص الاستمرارية"}
            ]
        }
    ]
}
];

/* ================= STATE ================= */

let lang = localStorage.getItem("lang") || "en";
let currentLesson = null;

/* ================= UI TEXT ================= */

const ui = {
en:{
    heroTitle:"Learn step by step",
    heroText:"Continue your repair training",
    continue:"Continue",
    done:"Done",
    completed:"Completed"
},
ar:{
    heroTitle:"تعلم خطوة خطوة",
    heroText:"واصل التدريب",
    continue:"متابعة",
    done:"إنهاء",
    completed:"تم"
}
};

const t = (k)=>ui[lang][k];

/* ================= IMAGE HELPER ================= */

function getComponentImage(id){
    const images = {
        resistor:"https://i.imgur.com/8QfQZQF.png",
        capacitor:"https://i.imgur.com/6YbQZQm.png",
        diode:"https://i.imgur.com/3fZQZQp.png"
    };
    return images[id] || "";
}

/* ================= RENDER HOME ================= */

function renderHome(){
    document.getElementById("heroTitle").textContent = t("heroTitle");
    document.getElementById("heroText").textContent = t("heroText");
    document.getElementById("continueBtn").textContent = t("continue");
    document.getElementById("langBtn").textContent = lang==="en"?"AR":"EN";

    const list = document.getElementById("branchList");
    list.innerHTML = "";

    branches.forEach(b=>{
        const div = document.createElement("button");
        div.textContent = b.title[lang];
        div.onclick = ()=>openLesson(b.lessons[0]);
        list.appendChild(div);
    });

    document.getElementById("progressBar").style.width = "30%";
}

/* ================= LESSON ================= */

function openLesson(lesson){
    currentLesson = lesson;

    document.getElementById("home").classList.remove("active");
    document.getElementById("lesson").classList.add("active");

    document.getElementById("lessonTitle").textContent = lesson.title[lang];
    document.getElementById("lessonDesc").textContent = lesson.desc[lang];
    document.getElementById("doneBtn").textContent = t("done");

    const box = document.getElementById("lessonPoints");
    box.innerHTML = "";

    lesson.points.forEach(p=>{
        const div = document.createElement("div");
        div.innerHTML = `<b>${p[lang]}</b>`;
        box.appendChild(div);
    });
}

/* ================= ACTIONS ================= */

function toggleDone(){
    alert("Lesson completed");
    goHome();
}

function continueLearning(){
    openLesson(branches[0].lessons[0]);
}

function goHome(){
    document.getElementById("lesson").classList.remove("active");
    document.getElementById("home").classList.add("active");
    renderHome();
}

function toggleLanguage(){
    lang = lang==="en"?"ar":"en";
    localStorage.setItem("lang",lang);
    renderHome();
}

/* ================= START ================= */

renderHome();

</script>

</body>
</html>
