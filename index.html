<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repair Academy</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

h1{
    color:#00aaff;
}

.card{
    margin:15px;
    padding:20px;
    background:#1c1c1c;
    border-radius:15px;
}

button{
    width:90%;
    padding:15px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#00aaff;
    color:white;
}

#content{
    margin-top:20px;
    padding:20px;
    background:#222;
    border-radius:10px;
}
</style>

</head>

<body>

<h1>🔧 Repair Academy</h1>

<div class="card">
    <button onclick="openChapter('chapter_1')">📘 Multimètre</button>
    <button onclick="openChapter('chapter_2')">📘 Composants</button>
</div>

<div id="content">Choisis un chapitre 👆</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const data = {
    chapter_1: {
        title: "Multimètre",
        text: "Apprendre les bases du multimètre"
    },
    chapter_2: {
        title: "Composants",
        text: "Résistance, diode, condensateur"
    }
};

function openChapter(id){
    document.getElementById("content").innerHTML =
        "<h3>" + data[id].title + "</h3><p>" + data[id].text + "</p>";

    tg.sendData(id);
}
</script>

</body>
</html>
