<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Repair Academy</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:20px;
}

.btn{
    padding:20px;
    border-radius:15px;
    background:#1e293b;
    cursor:pointer;
}

.lock{
    background:#111;
    opacity:0.5;
}

.done{
    background:green;
}

#content{
    display:none;
    padding:20px;
}

.back{
    margin-top:20px;
    padding:10px;
    background:#333;
}
</style>
</head>

<body>

<h1>Repair Academy</h1>

<div id="menu" class="grid"></div>

<div id="content"></div>

<script>

let progress = {
    "chap1_lvl1": true,
    "chap1_lvl2": false,
    "chap1_lvl3": false
};

const menu = document.getElementById("menu");
const content = document.getElementById("content");

// ================= MENU =================
function loadMenu(){
    menu.innerHTML = "";

    addButton("Chapitre 1 - Outils", openChap1);
}

// ================= BUTTON CREATOR =================
function addButton(text, action){
    let div = document.createElement("div");
    div.className = "btn";
    div.innerText = text;
    div.onclick = action;
    menu.appendChild(div);
}

// ================= CHAPITRE 1 =================
function openChap1(){
    menu.style.display="none";
    content.style.display="block";

    content.innerHTML = `
        <h2>Outils</h2>

        ${levelBtn("Niveau 1", "chap1_lvl1", lvl1)}
        ${levelBtn("Niveau 2", "chap1_lvl2", lvl2)}
        ${levelBtn("Niveau 3", "chap1_lvl3", lvl3)}

        <div class="back" onclick="back()">⬅ Retour</div>
    `;
}

// ================= LEVEL BUTTON =================
function levelBtn(name, key, action){
    let state = "";

    if(!progress[key]) state="lock";
    if(progress[key] && localStorage.getItem(key)) state="done";

    return `<div class="btn ${state}" onclick="${progress[key] ? action.name+'()' : ''}">
        ${name}
    </div>`;
}

// ================= LEVELS =================
function lvl1(){
    content.innerHTML = `
        <h2>Tournevis</h2>
        <p>Outil de base pour ouvrir les appareils.</p>

        <button onclick="finish('chap1_lvl1','chap1_lvl2')">Terminer</button>
        <div class="back" onclick="openChap1()">⬅ Retour</div>
    `;
}

function lvl2(){
    content.innerHTML = `
        <h2>Pince</h2>
        <p>Permet de manipuler les composants.</p>

        <button onclick="finish('chap1_lvl2','chap1_lvl3')">Terminer</button>
        <div class="back" onclick="openChap1()">⬅ Retour</div>
    `;
}

function lvl3(){
    content.innerHTML = `
        <h2>Fer à souder</h2>
        <p>Utilisé pour souder les composants électroniques.</p>

        <button onclick="finish('chap1_lvl3')">Terminer</button>
        <div class="back" onclick="openChap1()">⬅ Retour</div>
    `;
}

// ================= FINISH =================
function finish(current, next){
    localStorage.setItem(current, true);
    if(next) progress[next] = true;

    openChap1();
}

// ================= BACK =================
function back(){
    content.style.display="none";
    menu.style.display="grid";
}

// INIT
loadMenu();

</script>

</body>
</html>
