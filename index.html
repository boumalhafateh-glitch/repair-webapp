<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repair Academy</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
}

h1{
    margin:15px;
    font-size:22px;
}

.page{display:none;padding:15px;}
.active{display:block;}

.card{
    background:#1a1a1a;
    margin:10px;
    padding:15px;
    border-radius:16px;
    border:1px solid #2a2a2a;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

button{
    padding:14px;
    border-radius:10px;
    border:1px solid #333;
    background:#111;
    color:white;
}

.sos{
    background:#8b0000;
    border:1px solid #aa0000;
    margin-top:15px;
}
</style>
</head>

<body>

<h1>Repair Academy</h1>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">

<div class="grid">
<button onclick="openPage('c1')">Level 1</button>
<button onclick="openPage('c2')">Level 2</button>
<button onclick="openPage('c3')">Level 3</button>
<button onclick="openPage('c4')">Level 4</button>
<button onclick="openPage('c5')">Level 5</button>
<button onclick="openPage('c6')">Level 6</button>
<button onclick="openPage('c7')">Level 7</button>
<button onclick="openPage('c8')">Level 8</button>
<button onclick="openPage('c9')">Level 9</button>
<button onclick="openPage('c10')">Level 10</button>
</div>

<button class="sos" onclick="openSOS()">SOS</button>

</div>
</div>

<!-- LEVEL 1 -->
<div id="c1" class="page">
<div class="card">

<h2>Level 1</h2>

<div class="grid">
<button onclick="openPage('comp1')">IC</button>
<button onclick="openPage('comp2')">Power</button>
<button onclick="openPage('comp3')">RF</button>
<button onclick="openPage('comp4')">Connectors</button>
<button onclick="openPage('comp5')">Sensors</button>
<button onclick="openPage('comp6')">Audio</button>
</div>

<button onclick="openPage('home')">Back</button>

</div>
</div>

<!-- LEVEL 2 -->
<div id="c2" class="page">
<div class="card">
<h2>Level 2</h2>
<button onclick="openPage('home')">Back</button>
</div>
</div>

<!-- LEVEL 3-10 EMPTY -->
<div id="c3" class="page"><div class="card"><h2>Level 3</h2><button onclick="openPage('home')">Back</button></div></div>
<div id="c4" class="page"><div class="card"><h2>Level 4</h2><button onclick="openPage('home')">Back</button></div></div>
<div id="c5" class="page"><div class="card"><h2>Level 5</h2><button onclick="openPage('home')">Back</button></div></div>
<div id="c6" class="page"><div class="card"><h2>Level 6</h2><button onclick="openPage('home')">Back</button></div></div>
<div id="c7" class="page"><div class="card"><h2>Level 7</h2><button onclick="openPage('home')">Back</button></div></div>
<div id="c8" class="page"><div class="card"><h2>Level 8</h2><button onclick="openPage('home')">Back</button></div></div>
<div id="c9" class="page"><div class="card"><h2>Level 9</h2><button onclick="openPage('home')">Back</button></div></div>
<div id="c10" class="page"><div class="card"><h2>Level 10</h2><button onclick="openPage('home')">Back</button></div></div>

<!-- COMPONENTS -->
<div id="comp1" class="page"><div class="card"><h2>IC</h2><button onclick="openPage('c1')">Back</button></div></div>
<div id="comp2" class="page"><div class="card"><h2>Power</h2><button onclick="openPage('c1')">Back</button></div></div>
<div id="comp3" class="page"><div class="card"><h2>RF</h2><button onclick="openPage('c1')">Back</button></div></div>
<div id="comp4" class="page"><div class="card"><h2>Connectors</h2><button onclick="openPage('c1')">Back</button></div></div>
<div id="comp5" class="page"><div class="card"><h2>Sensors</h2><button onclick="openPage('c1')">Back</button></div></div>
<div id="comp6" class="page"><div class="card"><h2>Audio</h2><button onclick="openPage('c1')">Back</button></div></div>

<script>
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openSOS(){
window.open("https://t.me/c/3919937885/2","_blank");
}
</script>

</body>
</html>
