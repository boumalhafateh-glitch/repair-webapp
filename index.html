<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repair Academy</title>

<script src="https://t.me/+OVTmcEQLg00zMTQ0"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#070707;
    --panel:#141414;
    --panel2:#1d1d1d;
    --text:#ffffff;
    --muted:#a7a7a7;
    --gold:#f5c542;
    --red:#b00020;
    --green:#22c55e;
    --line:#2b2b2b;
}

*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top, rgba(245,197,66,.16), transparent 35%),
        linear-gradient(180deg, #0b0b0b, #050505);
    color:var(--text);
    min-height:100vh;
}

body[dir="rtl"]{
    font-family:Arial, sans-serif;
}

.app{
    width:100%;
    max-width:520px;
    margin:0 auto;
    padding:14px;
}

.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:14px;
}

.logo{
    text-align:left;
}

body[dir="rtl"] .logo{
    text-align:right;
}

.logo h1{
    font-family:'Orbitron', sans-serif;
    font-size:22px;
    margin:0;
    letter-spacing:0;
}

.logo span{
    color:var(--gold);
}

.status{
    font-size:12px;
    color:var(--muted);
    margin-top:3px;
}

.top-actions{
    display:flex;
    gap:8px;
}

.icon-btn,
.lang-btn{
    height:44px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#101010;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.icon-btn{
    width:44px;
    font-size:20px;
}

.lang-btn{
    min-width:58px;
    padding:0 12px;
    color:var(--gold);
}

.page{
    display:none;
    animation:fade .18s ease;
}

.page.active{display:block;}

@keyframes fade{
    from{opacity:.4; transform:translateY(4px);}
    to{opacity:1; transform:translateY(0);}
}

.hero{
    background:
        linear-gradient(135deg, rgba(245,197,66,.18), rgba(176,0,32,.10)),
        var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px;
    margin-bottom:14px;
    text-align:left;
}

body[dir="rtl"] .hero{
    text-align:right;
}

.hero h2{
    margin:0 0 8px;
    font-size:21px;
}

.hero p{
    margin:0;
    color:var(--muted);
    line-height:1.45;
    font-size:14px;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin:12px 0;
}

.stat{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px;
    text-align:center;
}

.stat strong{
    display:block;
    color:var(--gold);
    font-size:18px;
}

.stat small{
    color:var(--muted);
    font-size:11px;
}

.section-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin:18px 2px 10px;
}

.section-title h3{
    margin:0;
    font-size:16px;
}

.section-title small{
    color:var(--muted);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card-btn{
    min-height:96px;
    text-align:left;
    padding:13px;
    border-radius:10px;
    border:1px solid var(--line);
    background:linear-gradient(180deg, #191919, #101010);
    color:white;
    cursor:pointer;
}

body[dir="rtl"] .card-btn{
    text-align:right;
}

.card-btn:active{
    transform:scale(.98);
}

.card-btn strong{
    display:block;
    font-size:15px;
    margin-bottom:6px;
}

.card-btn small{
    display:block;
    color:var(--muted);
    font-size:12px;
    line-height:1.35;
}

.badge{
    display:inline-block;
    margin-top:9px;
    padding:4px 7px;
    border-radius:999px;
    background:rgba(245,197,66,.14);
    color:var(--gold);
    font-size:11px;
}

.panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px;
    margin-bottom:12px;
    text-align:left;
}

body[dir="rtl"] .panel{
    text-align:right;
}

.panel h2{
    margin:0 0 8px;
    font-size:21px;
}

.panel p{
    color:var(--muted);
    line-height:1.5;
    margin:8px 0;
    font-size:14px;
}

.list{
    display:grid;
    gap:9px;
}

.lesson{
    background:var(--panel2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px;
    text-align:left;
}

body[dir="rtl"] .lesson{
    text-align:right;
}

.lesson strong{
    display:block;
    margin-bottom:5px;
}

.lesson p{
    margin:0;
    color:var(--muted);
    font-size:13px;
    line-height:1.45;
}

.action-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:12px;
}

button{
    padding:13px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#111;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.primary{
    background:var(--gold);
    color:#111;
    border-color:#d7aa25;
}

.danger{
    background:linear-gradient(180deg, #b00020, #780015);
    border-color:#cf1235;
}

.back{
    width:100%;
    margin-top:10px;
}

.progress-wrap{
    margin-top:12px;
    background:#090909;
    border:1px solid var(--line);
    border-radius:999px;
    overflow:hidden;
    height:12px;
}

.progress{
    height:100%;
    width:10%;
    background:linear-gradient(90deg, var(--gold), var(--green));
}

.sos-box{
    border:1px solid rgba(176,0,32,.55);
    background:rgba(176,0,32,.12);
}

.footer{
    color:#777;
    font-size:11px;
    text-align:center;
    padding:14px 0 5px;
}

@media(max-width:360px){
    .grid{grid-template-columns:1fr;}
    .stats{grid-template-columns:1fr;}
    .action-row{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="app">

    <div class="topbar">

            <button class="primary" id="doneButton" onclick="markDone()"></button>

    <div class="footer" id="footerText"></div>

</div>

function t(key){
    return translations[currentLanguage][key];
}

function getLevelData(level){
    return level[currentLanguage];
}

function setStaticTexts(){
    document.documentElement.lang = t("htmlLang");
    document.documentElement.dir = t("dir");
    document.body.dir = t("dir");

    document.getElementById("langButton").textContent = t("langButton");
    document.getElementById("telegramStatus").textContent = tg ? t("telegramConnected") : t("browserMode");
    document.getElementById("heroTitle").textContent = t("heroTitle");
    document.getElementById("heroText").textContent = t("heroText");
    document.getElementById("statLevels").textContent = t("statLevels");
    document.getElementById("statBasics").textContent = t("statBasics");
    document.getElementById("statHelp").textContent = t("statHelp");
    document.getElementById("pathTitle").textContent = t("pathTitle");
    document.getElementById("pathSubtitle").textContent = t("pathSubtitle");
    document.getElementById("supportTitle").textContent = t("supportTitle");
    document.getElementById("supportSubtitle").textContent = t("supportSubtitle");
    document.getElementById("sosTitle").textContent = t("sosTitle");
    document.getElementById("sosText").textContent = t("sosText");
    document.getElementById("sosButton").textContent = t("sosButton");
    document.getElementById("modulesTitle").textContent = t("modulesTitle");
    document.getElementById("quickSheetTitle").textContent = t("quickSheetTitle");
    document.getElementById("rememberText").textContent = t("rememberText");
    document.getElementById("backHomeButton").textContent = t("backHomeButton");
    document.getElementById("backLevelButton").textContent = t("backLevelButton");
    document.getElementById("doneButton").textContent = t("doneButton");
    document.getElementById("footerText").textContent = t("footerText");
}

function showPage(id){
    document.querySelectorAll(".page").forEach(page => page.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    window.scrollTo(0,0);
}

function renderLevels(){
    const grid = document.getElementById("levelsGrid");
    grid.innerHTML = "";

    levels.forEach(level => {
        const data = getLevelData(level);
        const moduleWord = data.modules.length > 1 ? t("modulePlural") : t("moduleSingular");

        const btn = document.createElement("button");
        btn.className = "card-btn";
        btn.onclick = () => openLevel(level.id);
        btn.innerHTML = `
            <strong>${data.title}</strong>
            <small>${data.name}</small>
            <span class="badge">${data.modules.length} ${moduleWord}</span>
        `;
        grid.appendChild(btn);
    });
}

function openLevel(id){
    currentLevel = levels.find(level => level.id === id);
    currentModule = null;

    const data = getLevelData(currentLevel);
    const moduleWord = data.modules.length > 1 ? t("modulePlural") : t("moduleSingular");

    document.getElementById("levelTitle").textContent = data.title + " - " + data.name;
    document.getElementById("levelDesc").textContent = data.desc;
    document.getElementById("moduleCount").textContent = data.modules.length + " " + moduleWord;

    const grid = document.getElementById("modulesGrid");
    grid.innerHTML = "";

    data.modules.forEach((module, index) => {
        const btn = document.createElement("button");
        btn.className = "card-btn";
        btn.onclick = () => openModule(index);
        btn.innerHTML = `
            <strong>${module.title}</strong>
            <small>${module.desc}</small>
            <span class="badge">${t("openBadge")}</span>
        `;
        grid.appendChild(btn);
    });

    sendTelegramData("level_" + id);
    showPage("levelPage");
}

function openModule(index){
    const data = getLevelData(currentLevel);
    currentModule = data.modules[index];

    document.getElementById("moduleTitle").textContent = currentModule.title;
    document.getElementById("moduleDesc").textContent = currentModule.desc;

    const list = document.getElementById("lessonList");
    list.innerHTML = "";

    currentModule.lessons.forEach(item => {
        const box = document.createElement("div");
        box.className = "lesson";
        box.innerHTML = `
            <strong>${item[0]}</strong>
            <p>${item[1]}</p>
        `;
        list.appendChild(box);
    });

    sendTelegramData("module_" + currentModule.title);
    showPage("modulePage");
}

function goHome(){
    currentLevel = null;
    currentModule = null;
    showPage("home");
}

function goBackLevel(){
    if(currentLevel){
        openLevel(currentLevel.id);
    }else{
        goHome();
    }
}

function markDone(){
    if(tg){
        tg.HapticFeedback.notificationOccurred("success");
        tg.showAlert(t("completedAlert"));
    }else{
        alert(t("completedAlert"));
    }
}

function openSOS(){
    const sosLink = "https://t.me/TON_GROUPE_OU_TON_SUPPORT";

    if(tg){
        tg.openTelegramLink(sosLink);
    }else{
        window.open(sosLink, "_blank");
    }
}

function sendTelegramData(data){
    try{
        if(tg){
            tg.sendData(data);
        }
    }catch(e){}
}

function toggleLanguage(){
    currentLanguage = currentLanguage === "en" ? "ar" : "en";
    localStorage.setItem("repair_academy_language", currentLanguage);

    setStaticTexts();
    renderLevels();

    if(currentLevel && document.getElementById("levelPage").classList.contains("active")){
        openLevel(currentLevel.id);
    }

    if(currentLevel && document.getElementById("modulePage").classList.contains("active")){
        const oldModuleTitle = currentModule ? currentModule.title : null;
        const data = getLevelData(currentLevel);
        const index = Math.max(0, data.modules.findIndex(module => module.title === oldModuleTitle));
        openModule(index === -1 ? 0 : index);
    }
}

setStaticTexts();
renderLevels();
</script>
